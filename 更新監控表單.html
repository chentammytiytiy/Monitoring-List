        .sidebar {

            overflow-y: auto;

            font-size: 1.2rem;

            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .sidebar-menu {

            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            flex: 1;

            font-size: 0.9rem;
            font-weight: 600;

        .sidebar-logout a {

            font-weight: 600;

            align-items: center;
            gap: 8px;
            cursor: pointer;
            margin-top: 0.5rem;

        .sidebar-logout a:hover {

        }

        .sidebar-user {

        .main-content {

            flex-direction: column;
            align-items: center;

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxlVEL8SwA5hy28n2-6TgQGG1cd0rhG81azxr4nlUwy-c6lqtODZHrwI5yeOOAfb5vC7A/exec';
        let allHistoricalRecords = [];
        let currentFilteredRecords = []; // Keep track of the currently displayed records for Excel export
        let currentPage = 1;
        const itemsPerPage = 50;

        // ====================================================
        // 使用 POST 請求 + JSON Body 寫入 GAS（解決 URL 長度限制）
        // 整批覆蓋 mode：action='save'
        // ====================================================
        async function saveToGAS(data) {
            const jsonStr = JSON.stringify({ action: 'save', data });
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: 'data=' + encodeURIComponent(jsonStr),
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                });
                const text = await response.text();
                try { 
                    const p = JSON.parse(text); 
                    if (p.error) throw new Error(p.error);
                    return p;
                } catch(e) { 
                    if (e.message !== "Unexpected token" && !e.message.startsWith("Unexpected")) {
                        if (text.includes('"error"')) {
                            throw new Error("Server returned an error but parsing failed: " + text.substring(0, 100));
                        }
                    }
                    if (e.message && e.message.includes("error")) throw e;
                    return { success: true, raw: text }; 
                }
            } catch (err) {
                console.warn('POST 失敗，嘗試 GET 備用:', err.message);
                const jsonStr2 = JSON.stringify(data);
                if (jsonStr2.length < 6000) {
                    const url = `${SCRIPT_URL}?action=save&data=${encodeURIComponent(jsonStr2)}`;
                    const r = await fetch(url);
                    const resJson = await r.json();
                    if (resJson.error) throw new Error(resJson.error);
                    return resJson;
                }
                throw err;
            }
        }

        // Helper: fetch with timeout
        async function fetchWithTimeout(url, options = {}, timeoutMs = 30000) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeoutMs);
            try {
                const response = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(timer);
                return response;
            } catch (err) {
                clearTimeout(timer);
                throw err;
            }
        }

        // Helper: load data with retry
        async function loadData(retries = 2) {
            for (let i = 0; i <= retries; i++) {
                try {
                    const response = await fetchWithTimeout(`${SCRIPT_URL}?t=${new Date().getTime()}`, {}, 30000);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const text = await response.text();
                    const data = JSON.parse(text);
                    if (Array.isArray(data)) return data;
                    if (data && data.error) throw new Error(data.error);
                    return [];
                } catch (err) {
                    console.warn(`第 ${i + 1} 次載入失敗:`, err.message);
                    if (i < retries) {
                        await new Promise(r => setTimeout(r, 2000)); // 等待 2 秒後重試
                    } else {
                        throw err;
                    }
                }
            }
        }

        document.getElementById('btn-search').addEventListener('click', function () {
            const sDateStart = document.getElementById('search-date-start').value.trim();
            const sDateEnd = document.getElementById('search-date-end').value.trim();
            const sCodeOrName = document.getElementById('search-code').value.trim().toLowerCase();
            const sSystem = document.getElementById('search-system').value;
            const sOwner = document.getElementById('search-owner').value.trim().toLowerCase();

            // Convert boundaries to Comparable Date objects if they exist
            let dStart = null, dEnd = null;
            if (sDateStart) dStart = new Date(sDateStart);
            if (sDateEnd) {
                // To include the entire end day, we could technically append 23:59:59 but 
                // since the record saleDate doesn't usually have a time component, simple Date comparison is fine.
                dEnd = new Date(sDateEnd);
            }

            const filtered = allHistoricalRecords.filter(record => {
                let match = true;

                // 1. Date Range check
                if (dStart || dEnd) {
                    const recDateStr = record['開賣日期'];
                    if (!recDateStr) {
                        match = false;
                    } else {
                        // Attempt to parse exactly "yyyy/mm/dd" correctly
                        // The recorded format is usually yyyy/mm/dd mapping cleanly
                        const recDate = new Date(recDateStr);
                        if (!isNaN(recDate.getTime())) {
                            if (dStart && recDate < dStart) match = false;
                            if (dEnd && recDate > dEnd) match = false;
                        } else {
                            // Fallback string manipulation if parsing failed
                            match = false; // hard to compare range on totally malformed date strings
                        }
                    }
                }

                // 2. Code or Name check (A節目代碼/E活動分類 OR 活動名稱)
                if (sCodeOrName && match) {
                    const code = (record['A節目代碼/E活動分類'] || '').toLowerCase();
                    const name = (record['活動名稱'] || '').toLowerCase();
                    if (!code.includes(sCodeOrName) && !name.includes(sCodeOrName)) {
                        match = false;
                    }
                }

                // 3. System check
                if (sSystem && match) {
                    if (record['系統別'] !== sSystem) {
                        match = false;
                    }
                }

                // 4. Owner check
                if (sOwner && match) {
                    const owner = (record['負責業務'] || '').toLowerCase();
                    if (!owner.includes(sOwner)) {
                        match = false;
                    }
                }

                return match;
            });

            // Re-sort data descending by "開賣日期"
            const sortedBySaleDate = [...filtered].sort((a, b) => {
                // Parse correctly, fallback to epoch if missing
                const dateA = new Date(a['開賣日期'] || parseInt(a['申請時間']));
                const dateB = new Date(b['開賣日期'] || parseInt(b['申請時間']));
                return dateB - dateA;
            });

            currentFilteredRecords = sortedBySaleDate;
            currentPage = 1; // Reset to page 1 on new search
            renderTablePaginated();

            const excelBtn = document.getElementById('btn-export-excel');

                excelBtn.setAttribute('disabled', 'true');
                excelBtn.style.opacity = '0.5';
                excelBtn.style.cursor = 'not-allowed';
            }
        });

        // --- Date Format Helpers ---
        function formatApplyTime(val) {
            if (!val) return '-';
            let isUpdated = val.includes('(已更新)') ? ' (已更新)' : '';
            let dateStr = val.replace('(已更新)', '').trim();
            let d = new Date(dateStr);
            if (isNaN(d.getTime())) return val;
            
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            const hh = String(d.getHours()).padStart(2, '0');
            const min = String(d.getMinutes()).padStart(2, '0');
            return `${yyyy}/${mm}/${dd} ${hh}:${min}${isUpdated}`;
        }

        function formatSaleDateStr(val) {
            if (!val) return '';
            let d = new Date(val);
            if (isNaN(d.getTime())) return val;
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            return `${yyyy}/${mm}/${dd}`;
        }

        function formatTimeHM(val) {
            if (!val) return '-';
            let str = String(val).trim();
            if (str.includes(':')) {
                let parts = str.split(':');
                if (parts.length >= 2) {
                    let hhStr = parts[0].trim();
                    let mmStr = parts[1].trim();
                    if (hhStr.includes(' ')) {
                        const sp = hhStr.split(' ');
                        hhStr = sp[sp.length - 1];
                    }
                    if (hhStr.includes('T')) {
                        const sp = hhStr.split('T');
                        hhStr = sp[sp.length - 1];
                    }
                    const hh = parseInt(hhStr, 10);
                    const mm = parseInt(mmStr, 10);
                    if (!isNaN(hh) && !isNaN(mm)) {
                        return `${String(hh).padStart(2, '0')}:${String(mm).padStart(2, '0')}`;
                    }
                }
            }
            return str;
        }

        function applyStickyColumns() {
            setTimeout(() => {
                const table = document.getElementById('results-table');
                if (!table) return;
                const ths = table.querySelectorAll('thead th');
                if (ths.length < 5) return;
                
                let leftOffsets = [];
                let currentLeft = 0;
                for (let i = 0; i < 5; i++) {
                    leftOffsets.push(currentLeft);
                    currentLeft += ths[i].offsetWidth;
                }
                
                for (let i = 0; i < 5; i++) {
                    ths[i].classList.add('sticky-col');
                    if (i === 4) ths[i].classList.add('sticky-col-last');
                    ths[i].style.left = leftOffsets[i] + 'px';
                }
                
                const trs = table.querySelectorAll('tbody tr');
                trs.forEach(tr => {
                    const tds = tr.querySelectorAll('td');
                    if (tds.length === 1) return; // empty state
                    for (let i = 0; i < 5; i++) {
                        if (!tds[i]) continue;
                        tds[i].classList.add('sticky-col');
                        if (i === 4) tds[i].classList.add('sticky-col-last');
                        tds[i].style.left = leftOffsets[i] + 'px';
                    }
                });
            }, 0);
        }

        async function saveRow(btn, idx) {

            // Read values back
            const newSaleDate = tr.querySelector('.input-saleDate').value.trim().replace(/-/g, '/');
            const hhVal = tr.querySelector('.input-time-hh').value.trim();
            const mmVal = tr.querySelector('.input-time-mm').value.trim();

            const newLevel = tr.querySelector('.input-level').value.trim();

            const newMachineFlow = tr.querySelector('.input-machineFlow').value.trim();
            const newTickets = tr.querySelector('.input-tickets').value.trim();
            const newOtherMonitor = tr.querySelector('.input-otherMonitor').value.trim();
            const newNote = tr.querySelector('.input-note').value.trim();
            const newOwner = tr.querySelector('.input-owner').value.trim();
            const newOp = tr.querySelector('.input-op').value.trim();

            const record = allHistoricalRecords[idx];
            const mods = record._modified || [];

            const updates = [
                { k: '開賣日期', v: newSaleDate },
                { k: '時間', v: newTime },
                { k: '售票/核銷', v: newAction },
                { k: '監控等級', v: newLevel },
                { k: '系統別', v: newSys },
                { k: 'A節目代碼/E活動分類', v: newCode },
                { k: '活動名稱', v: newName },
                { k: '機器等級', v: newMachine },
                { k: '排隊機制', v: newQueue },
                { k: '售票通路', v: newChannel },
                { k: '機台流管', v: newMachineFlow },
                { k: '可售張數', v: newTickets },
                { k: '其它單位監控', v: newOtherMonitor },
                { k: '特別說明', v: newNote },
                { k: '負責業務', v: newOwner },
                { k: '建檔OP', v: newOp }
            ];

            updates.forEach(u => {
                if (record[u.k] !== u.v) {
                    if (!mods.includes(u.k)) mods.push(u.k);
                    record[u.k] = u.v;
                }
            });

            const days = ['日', '一', '二', '三', '四', '五', '六'];
            if (newSaleDate) {
                const dayIndex = new Date(newSaleDate).getDay();
                if (!isNaN(dayIndex) && record['星期'] !== days[dayIndex]) {
                    record['星期'] = days[dayIndex];
                }
            } else {
                record['星期'] = '';
            }

            record._modified = mods;
            const now = new Date();
            const nowY = now.getFullYear();
            const nowM = String(now.getMonth() + 1).padStart(2, '0');
            const nowD = String(now.getDate()).padStart(2, '0');
            const nowH = String(now.getHours()).padStart(2, '0');
            const nowMin = String(now.getMinutes()).padStart(2, '0');
            record['申請時間'] = `${nowY}/${nowM}/${nowD} ${nowH}:${nowMin} (已更新)`;
            try {
                const s = sessionStorage.getItem(SESSION_KEY);
                const sess = s ? JSON.parse(s) : {};
                record['異動人員'] = sess.name || sess.username || '未知';
            } catch(e) {}

            try {
                btn.textContent = '儲存中...';
                const result = await saveToGAS(allHistoricalRecords);
                if (result && result.error) throw new Error(result.error);
                console.log('儲存結果:', result);
            } catch (e) {
                alert('資料庫更新失敗：' + e.message);
                btn.textContent = '儲存';
                return;
            }

            // Resend Email with the updated single record (to notify the update)
            try {
                sendUpdateEmailNotification([record]);
            } catch (err) {
                console.error("發送信件失敗:", err);
            }

            // Re-render
            alert('已成功更新資料，畫面即將重新整理顯示最新紀錄。');
            window.location.reload();
        }

    <script>
        // ── 登入驗證 & 登出 ──
        const SESSION_KEY = 'monitoring_system_session';
        (function checkAuth() {
            const s = sessionStorage.getItem(SESSION_KEY);
            let session = null;
            try { session = JSON.parse(s); } catch(e) {}
            if (!session || !session.username) {
                window.location.href = 'login.html';
                return;
            }
            if (session.role !== 'admin') {
                const perms = session.permissions || [];
                if (!perms.includes('查詢及更新監控表單')) {
                    alert('您沒有權限存取此頁面！');
                    window.location.href = 'login.html';
                    return;
                }
            }
            const infoEl = document.getElementById('sidebar-user-info');
            if (infoEl) infoEl.textContent = session.name || session.username;
            if (session.role === 'admin') {
                const li = document.getElementById('li-admin-link');
                if (li) li.style.display = '';
            }
        })();

        document.getElementById('btn-logout').addEventListener('click', function(e) {
            e.preventDefault();
            if (confirm('確定要登出嗎？')) {
                sessionStorage.removeItem(SESSION_KEY);
                window.location.href = 'login.html';
            }
        });

<!DOCTYPE html>
<html lang="zh-TW">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>監控申請表單</title>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
	<style>
		:root {
			--primary: #4f46e5;
			--primary-hover: #4338ca;
			--bg-color: #f8fafc;
			--card-bg: rgba(255, 255, 255, 0.95);
			--text-main: #1e293b;
			--text-muted: #64748b;
			--border-color: rgba(0, 0, 0, 0.1);
			--input-bg: #ffffff;
			color-scheme: light;
		}

		body {
			margin: 0;
			font-family: 'Inter', "微軟正黑體", sans-serif;
			background: linear-gradient(135deg, #e2e8f0 0%, #f8fafc 100%);
			color: var(--text-main);
			height: 100vh;
			display: flex;
			overflow: hidden;
		}

		.sidebar {
			width: 200px;
			background: var(--card-bg);
			backdrop-filter: blur(16px);
			-webkit-backdrop-filter: blur(16px);
			border-right: 1px solid var(--border-color);
			padding: 1.5rem 0.8rem;
			box-shadow: 2px 0 15px rgba(0, 0, 0, 0.05);
			display: flex;
			flex-direction: column;
			flex-shrink: 0;
			overflow-y: auto;
		}

		.sidebar-title {
			font-size: 1.2rem;
			font-weight: 700;
			margin-bottom: 1.5rem;
			background: linear-gradient(135deg, #818cf8, #c084fc);
			-webkit-background-clip: text;
			background-clip: text;
			-webkit-text-fill-color: transparent;
			text-align: center;
		}

		.sidebar-menu {
			list-style: none;
			padding: 0;
			margin: 0;
			display: flex;
			flex-direction: column;
			gap: 0.6rem;
			flex: 1;
		}

		.sidebar-menu a {
			text-decoration: none;
			color: var(--text-muted);
			font-size: 0.9rem;
			font-weight: 600;
			padding: 0.8rem 1rem;
			border-radius: 10px;
			transition: all 0.3s ease;
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.sidebar-menu a:hover {
			background: rgba(79, 70, 229, 0.1);
			color: var(--primary);
		}

		.sidebar-menu a.active {
			background: linear-gradient(135deg, var(--primary), #a855f7);
			color: white;
			box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
		}

		.sidebar-divider {
			border: none;
			border-top: 1px solid var(--border-color);
			margin: 0.4rem 0;
		}

		.sidebar-logout {
			margin-top: auto;
			padding-top: 0.8rem;
		}

		.sidebar-logout a {
			text-decoration: none;
			color: #ef4444;
			font-size: 0.88rem;
			font-weight: 600;
			padding: 0.7rem 1rem;
			border-radius: 10px;
			transition: all 0.3s ease;
			display: flex;
			align-items: center;
			gap: 8px;
			cursor: pointer;
		}

		.sidebar-logout a:hover {
			background: rgba(239, 68, 68, 0.08);
		}

		.sidebar-user {
			font-size: 0.75rem;
			color: var(--text-muted);
			text-align: center;
			padding: 0.5rem 0.5rem 0;
			line-height: 1.4;
		}

		.main-content {
			flex: 1;
			padding: 2rem 1.5rem;
			display: flex;
			flex-direction: column;
			align-items: center;
			overflow-y: auto;
			box-sizing: border-box;
		}

		.container {
			background: var(--card-bg);
			backdrop-filter: blur(16px);
			-webkit-backdrop-filter: blur(16px);
			border: 1px solid var(--border-color);
			border-radius: 20px;
			padding: 2.5rem;
			width: 100%;
			max-width: 900px;
			box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
			animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
		}

		@keyframes fadeIn {
			from {
				opacity: 0;
				transform: translateY(30px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		h1 {
			margin: 0;
			text-align: center;
			font-size: 2.2rem;
			font-weight: 700;
			background: linear-gradient(135deg, #818cf8, #c084fc, #f472b6);
			-webkit-background-clip: text;
			background-clip: text;
			-webkit-text-fill-color: transparent;
			letter-spacing: -0.02em;
		}

		.header-row {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 2.5rem;
			flex-wrap: wrap;
			gap: 1rem;
		}

		.nav-link {
			color: var(--primary);
			text-decoration: none;
			font-weight: 600;
			display: flex;
			align-items: center;
			gap: 0.5rem;
			padding: 0.6rem 1.2rem;
			border-radius: 8px;
			background: rgba(79, 70, 229, 0.1);
			transition: all 0.2s;
			font-size: 0.95rem;
		}

		.nav-link:hover {
			background: rgba(79, 70, 229, 0.2);
		}

		.form-grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
			gap: 1.5rem;
		}

		.form-group {
			display: flex;
			flex-direction: column;
			animation: slideIn 0.5s ease forwards;
			opacity: 0;
		}

		.form-group:nth-child(1) {
			animation-delay: 0.05s;
		}

		.form-group:nth-child(2) {
			animation-delay: 0.1s;
		}

		.form-group:nth-child(3) {
			animation-delay: 0.15s;
		}

		.form-group:nth-child(4) {
			animation-delay: 0.2s;
		}

		.form-group:nth-child(5) {
			animation-delay: 0.25s;
		}

		.form-group:nth-child(6) {
			animation-delay: 0.3s;
		}

		.form-group:nth-child(7) {
			animation-delay: 0.35s;
		}

		.form-group:nth-child(8) {
			animation-delay: 0.4s;
		}

		.form-group:nth-child(9) {
			animation-delay: 0.45s;
		}

		.form-group:nth-child(10) {
			animation-delay: 0.5s;
		}

		.form-group:nth-child(11) {
			animation-delay: 0.55s;
		}

		.form-group:nth-child(12) {
			animation-delay: 0.6s;
		}

		.form-group:nth-child(13) {
			animation-delay: 0.65s;
		}

		.form-group:nth-child(14) {
			animation-delay: 0.7s;
		}

		.form-group:nth-child(15) {
			animation-delay: 0.75s;
		}

		.form-group:nth-child(16) {
			animation-delay: 0.8s;
		}

		.form-group:nth-child(17) {
			animation-delay: 0.85s;
		}

		.form-group:nth-child(18) {
			animation-delay: 0.9s;
		}

		input:disabled,
		select:disabled,
		textarea:disabled {
			opacity: 0.7;
			cursor: not-allowed;
			background: #f1f5f9 !important;
			border-color: rgba(0, 0, 0, 0.1) !important;
		}

		@keyframes slideIn {
			from {
				opacity: 0;
				transform: translateX(-10px);
			}

			to {
				opacity: 1;
				transform: translateX(0);
			}
		}

		.form-group.full-width {
			grid-column: 1 / -1;
		}

		label {
			font-size: 0.9rem;
			font-weight: 500;
			margin-bottom: 0.6rem;
			color: var(--text-muted);
			letter-spacing: 0.02em;
		}

		input[type="text"],
		input[type="date"],
		input[type="time"],
		input[type="number"],
		select,
		textarea {
			background: var(--input-bg);
			border: 1px solid var(--border-color);
			color: var(--text-main);
			padding: 0.8rem 1rem;
			border-radius: 10px;
			font-size: 1rem;
			transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
			outline: none;
			font-family: inherit;
		}

		input:hover,
		select:hover,
		textarea:hover {
			border-color: rgba(0, 0, 0, 0.3);
		}

		input:focus,
		select:focus,
		textarea:focus {
			border-color: var(--primary);
			box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.25);
			background: #ffffff;
		}

		.radio-group {
			display: flex;
			gap: 1.5rem;
			align-items: center;
			height: 100%;
			padding: 0.6rem 0;
		}

		.radio-group label {
			color: var(--text-main);
			display: flex;
			align-items: center;
			gap: 0.5rem;
			cursor: pointer;
			margin: 0;
			font-size: 1rem;
			transition: color 0.2s;
		}

		.radio-group label:hover {
			color: var(--primary);
		}

		.radio-group input[type="radio"] {
			accent-color: var(--primary);
			width: 1.25rem;
			height: 1.25rem;
			cursor: pointer;
		}

		textarea {
			resize: vertical;
			min-height: 100px;
		}

		.buttons {
			display: flex;
			justify-content: flex-end;
			gap: 1.2rem;
			margin-top: 2.5rem;
			grid-column: 1 / -1;
			animation: slideIn 0.5s ease forwards;
			animation-delay: 0.85s;
			opacity: 0;
		}

		button {
			padding: 0.8rem 1.8rem;
			border: none;
			border-radius: 10px;
			font-size: 1.05rem;
			font-weight: 600;
			cursor: pointer;
			transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
			display: flex;
			align-items: center;
			gap: 0.5rem;
		}

		.btn-cancel {
			background: rgba(0, 0, 0, 0.05);
			color: var(--text-main);
			border: 1px solid var(--border-color);
		}

		.btn-cancel:hover {
			background: rgba(0, 0, 0, 0.1);
			border-color: rgba(0, 0, 0, 0.3);
		}

		.btn-save {
			background: linear-gradient(135deg, var(--primary), #a855f7);
			color: white;
			box-shadow: 0 4px 15px -3px rgba(168, 85, 247, 0.4);
		}

		.btn-save:hover {
			transform: translateY(-2px);
			box-shadow: 0 8px 20px -4px rgba(168, 85, 247, 0.6);
		}

		.btn-save:active {
			transform: translateY(1px);
		}

		.result-grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
			gap: 1rem;
			margin-bottom: 2.5rem;
		}

		.result-item {
			background: rgba(0, 0, 0, 0.02);
			padding: 1.2rem;
			border-radius: 12px;
			border: 1px solid var(--border-color);
			display: flex;
			justify-content: space-between;
			align-items: flex-start;
			transition: transform 0.2s ease, background 0.2s ease;
		}

		.result-item:hover {
			transform: translateY(-2px);
			background: rgba(0, 0, 0, 0.04);
		}

		.result-item .label {
			color: var(--text-muted);
			font-size: 0.9rem;
			line-height: 1.5;
			margin-right: 0.5rem;
		}

		.result-item .val {
			font-weight: 500;
			color: var(--text-main);
			text-align: right;
			max-width: 65%;
			word-break: break-word;
			line-height: 1.5;
		}

		.success-icon {
			display: flex;
			justify-content: center;
			margin-bottom: 1.5rem;
		}

		.success-icon svg {
			width: 64px;
			height: 64px;
			color: #34d399;
			filter: drop-shadow(0 0 10px rgba(52, 211, 153, 0.4));
		}

		@media (max-width: 600px) {
			.container {
				padding: 1.5rem;
			}

			h1 {
				font-size: 1.8rem;
			}

			.radio-group {
				flex-direction: column;
				align-items: flex-start;
				gap: 0.8rem;
			}

			.buttons {
				flex-direction: column;
			}

			button {
				justify-content: center;
			}
		}

		/* ── 必填驗證樣式 ── */
		.input-error {
			border-color: #f43f5e !important;
			box-shadow: 0 0 0 3px rgba(244, 63, 94, 0.2) !important;
			background: #fff5f7 !important;
		}

		.field-error-msg {
			color: #f43f5e;
			font-size: 0.8rem;
			margin-top: 0.4rem;
			display: flex;
			align-items: center;
			gap: 0.35rem;
			animation: fadeIn 0.3s ease;
		}

		.validation-banner {
			background: linear-gradient(135deg, #fee2e2, #fecdd3);
			border: 1px solid #fca5a5;
			border-radius: 12px;
			padding: 1rem 1.2rem;
			margin-bottom: 1.5rem;
			display: flex;
			align-items: flex-start;
			gap: 0.8rem;
			color: #9f1239;
			font-size: 0.9rem;
			animation: slideIn 0.3s ease forwards;
		}

		.validation-banner svg {
			flex-shrink: 0;
			margin-top: 2px;
		}

		.validation-banner ul {
			margin: 0.3rem 0 0 0;
			padding-left: 1.2rem;
		}

		.validation-banner li {
			margin: 0.2rem 0;
		}
	</style>
</head>

	<div class="main-content">

	<!-- Form Container -->
	<div class="container" id="form-container">
		<div class="header-row">
			<h1>監控申請表單</h1>
		</div>
		<form id="monitorForm">
			<div class="form-grid">
				<div class="form-group" style="grid-column: span 2;">
					<label for="saleDateTime">銷售日期時間 <span style="color:#f472b6">*</span></label>
					<input type="text" id="saleDateTime" name="銷售日期時間" required placeholder="請選擇銷售日期與時間" style="background:#fff url('data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'16\' height=\'16\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%2364748b\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><rect x=\'3\' y=\'4\' width=\'18\' height=\'18\' rx=\'2\' ry=\'2\'/><line x1=\'16\' y1=\'2\' x2=\'16\' y2=\'6\'/><line x1=\'8\' y1=\'2\' x2=\'8\' y2=\'6\'/><line x1=\'3\' y1=\'10\' x2=\'21\' y2=\'10\'/></svg>') no-repeat 96% center; padding-right: 2.5rem; cursor: pointer;">
				</div>

				<div class="form-group">
					<label for="ticketAction">售票/核銷</label>
					<select id="ticketAction" name="售票/核銷">
						<option value="售票">售票</option>
						<option value="核銷">核銷</option>
					</select>
				</div>

				<div class="form-group">
					<label for="monitorLevel">監控等級</label>
					<select id="monitorLevel" name="監控等級">
						<option value="小">小</option>
						<option value="中">中</option>
						<option value="大">大</option>
						<option value="免監控">免監控</option>
					</select>
				</div>

				<div class="form-group">
					<label for="systemType">系統別</label>
					<select id="systemType" name="系統別">
						<option value="A系統">A系統</option>
						<option value="E系統">E系統</option>
						<option value="交通">交通</option>
						<option value="其他">其他</option>
					</select>
				</div>

				<div class="form-group">
					<label for="programCode">A節目代碼 / E活動分類 <span style="color:#f472b6">*</span></label>
					<input type="text" id="programCode" name="A節目代碼/E活動分類" required placeholder="請輸入代碼或分類">
				</div>

				<div class="form-group">
					<label for="eventName">活動名稱 <span style="color:#f472b6">*</span></label>
					<input type="text" id="eventName" name="活動名稱" required placeholder="請輸入活動名稱">
				</div>

				<div class="form-group">
					<label for="machineLevel">機器等級</label>
					<select id="machineLevel" name="機器等級">
						<option value="小">小</option>
						<option value="中">中</option>
						<option value="大">大</option>
					</select>
				</div>

				<div class="form-group">
					<label>排隊機制</label>
					<div class="radio-group">
						<label><input type="radio" name="排隊機制" value="無" checked> 無</label>
						<label><input type="radio" name="排隊機制" value="一般排隊"> 一般排隊</label>
						<label><input type="radio" name="排隊機制" value="流管畫面"> 流管畫面</label>
					</div>
				</div>

				<div class="form-group">
					<label for="ticketChannel">售票通路</label>
					<select id="ticketChannel" name="售票通路">
						<option value="網站">網站</option>
						<option value="機台">機台</option>
						<option value="網站+機台">網站+機台</option>
					</select>
				</div>

				<div class="form-group">
					<label for="machineFlowControl">機台流管</label>

	<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
	<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh-tw.js"></script>
	<script>
		window.fp = flatpickr("#saleDateTime", {
			enableTime: true,
			dateFormat: "Y/m/d H:i",
			time_24hr: true,
			locale: "zh_tw",
			onChange: function() {
				clearFieldError(document.getElementById('saleDateTime'));
			}
		});

		const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyAE9D4xxmt5YqmvoUJjWXgzuGWykP9HtTGeaURK2Mwjwn9NEYp0SbgNJlnH0uw2eajag/exec';

		// ====================================================
		// 必填欄位驗證
		// ====================================================
		const REQUIRED_FIELDS = [
			{ id: 'saleDateTime',      label: '銷售日期時間' },
			{ id: 'programCode',       label: 'A節目代碼 / E活動分類' },
			{ id: 'eventName',         label: '活動名稱' },
			{ id: 'ticketCount',       label: '可售張數' },
			{ id: 'monitorPersonnel',  label: '負責業務' },
		];

		function clearFieldError(el) {
			el.classList.remove('input-error');
			const msg = el.parentNode.querySelector('.field-error-msg');
			if (msg) msg.remove();
			// 若所有欄位都已清除，移除頂部橫幅
			if (!document.querySelector('.input-error')) {
				const banner = document.getElementById('validation-banner');
				if (banner) banner.remove();
			}
		}

		function validateRequired() {
			// 清除舊錯誤
			document.querySelectorAll('.input-error').forEach(el => el.classList.remove('input-error'));
			document.querySelectorAll('.field-error-msg').forEach(el => el.remove());
			const oldBanner = document.getElementById('validation-banner');
			if (oldBanner) oldBanner.remove();

			const missing = [];
			REQUIRED_FIELDS.forEach(({ id, label }) => {
				const el = document.getElementById(id);
				if (!el || !el.value.trim()) {
					missing.push(label);
					if (el) {
						el.classList.add('input-error');
						const msg = document.createElement('div');
						msg.className = 'field-error-msg';
						msg.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> 此欄位為必填`;
						el.parentNode.appendChild(msg);
					}
				}
			});

			if (missing.length > 0) {
				const banner = document.createElement('div');
				banner.id = 'validation-banner';
				banner.className = 'validation-banner';
				banner.innerHTML = `
					<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
					<div>
						<strong>請填寫以下必填欄位（標示 * 者）：</strong>
						<ul>${missing.map(m => `<li>${m}</li>`).join('')}</ul>
					</div>
				`;
				const formGrid = document.querySelector('#monitorForm .form-grid');
				formGrid.parentNode.insertBefore(banner, formGrid);
				banner.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
				return false;
			}
			return true;
		}

		// 輸入時即時移除單一欄位錯誤狀態
		REQUIRED_FIELDS.forEach(({ id }) => {
			const el = document.getElementById(id);
			if (el) {
				el.addEventListener('input', () => clearFieldError(el));
				el.addEventListener('change', () => clearFieldError(el));
			}
		});
		let recordsList = [];
		let editIndex = -1;

		// ====================================================
		// 使用 POST 請求 + JSON Body 寫入 GAS（解決 URL 長度限制）
		// action='append'：只傳新增資料，GAS 在後端讀取並合併
		// action='save'：整批覆蓋（用於更新/刪除）
		// ====================================================
		async function saveToGAS(data, action = 'save') {
			const payload = JSON.stringify({ action, data });
			try {
				const response = await fetch(SCRIPT_URL, {
					method: 'POST',
					body: payload,
					headers: { 'Content-Type': 'text/plain' } // GAS 較易接受 text/plain
				});
				const text = await response.text();
				try { return JSON.parse(text); } catch(e) { return { success: true, raw: text }; }
			} catch (err) {
				// 備用：GET 方式（資料較小時可用）
				console.warn('POST 失敗，嘗試 GET 備用:', err.message);
				if (action === 'append' && Array.isArray(data) && data.length <= 5) {
					const jsonStr = JSON.stringify(data);
					const url = `${SCRIPT_URL}?action=save&data=${encodeURIComponent(jsonStr)}`;
					const r = await fetch(url);
					return await r.json();
				}
				throw err;
			}
		}

		// Form reset helper
		function resetFormHelper() {
			document.getElementById('monitorForm').reset();
			if (window.fp) window.fp.clear();
			editIndex = -1;

			const btnSave = document.querySelector('button[type="submit"].btn-save');
			btnSave.innerHTML = `
				<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<line x1="12" y1="5" x2="12" y2="19"></line>
					<line x1="5" y1="12" x2="19" y2="12"></line>
				</svg>
				新增此筆資料
			`;
			btnSave.style.background = ''; // reset to default CSS

			document.getElementById('btn-cancel-edit').style.display = 'none';
			document.getElementById('btn-cancel').style.display = 'flex';
		}

		// Cancel Empty Form button behavior
		document.getElementById('btn-cancel').addEventListener('click', function () {
			if (confirm("確定要清空目前填寫的欄位嗎？")) {
				resetFormHelper();
			}
		});

		// Cancel Edit button behavior
		document.getElementById('btn-cancel-edit').addEventListener('click', function () {
			if (confirm("確定要放棄編輯，回復到填寫狀態嗎？")) {
				resetFormHelper();
			}
		});

		function updateRecordsTable() {
			const container = document.getElementById('multi-records-container');
			const tbody = document.getElementById('multi-records-tbody');
			const countSpan = document.getElementById('record-count');

			if (recordsList.length === 0) {
				container.style.display = 'none';
				return;
			}

			container.style.display = 'block';
			countSpan.textContent = `(共 ${recordsList.length} 筆)`;

			let rows = '';
			recordsList.forEach((r, idx) => {
				rows += `
					<tr style="border-bottom: 1px solid var(--border-color);">
						<td style="padding: 0.8rem 0.5rem; color: var(--text-main);">${r['開賣日期']}</td>
						<td style="padding: 0.8rem 0.5rem; color: var(--text-main);">${r['活動名稱']}</td>
						<td style="padding: 0.8rem 0.5rem;">
							<button type="button" onclick="editRecord(${idx})" style="padding: 0.4rem 0.8rem; font-size: 0.85rem; background: rgba(59, 130, 246, 0.1); color: #2563eb; border: 1px solid rgba(59, 130, 246, 0.3); margin-right: 0.5rem; cursor: pointer; border-radius: 6px;">
								編輯
							</button>
							<button type="button" onclick="removeRecord(${idx})" style="padding: 0.4rem 0.8rem; font-size: 0.85rem; background: rgba(239, 68, 68, 0.1); color: #dc2626; border: 1px solid rgba(239, 68, 68, 0.3); cursor: pointer; border-radius: 6px;">
								刪除
							</button>
						</td>
					</tr>
				`;
			});
			tbody.innerHTML = rows;
		}

		window.removeRecord = function (idx) {
			recordsList.splice(idx, 1);
			if (editIndex === idx) {
				resetFormHelper();
			} else if (editIndex > idx) {
				editIndex--;
			}
			updateRecordsTable();
		};

		window.editRecord = function (idx) {
			editIndex = idx;
			const record = recordsList[idx];
			const form = document.getElementById('monitorForm');

			Array.from(form.elements).forEach(input => {
				if (!input.name) return;
				let val = record[input.name];
				if (val === '(無)') val = '';

				if (input.id === 'saleDateTime') {
					if (record['開賣日期'] && record['時間']) {
						val = record['開賣日期'] + ' ' + record['時間'];
						if (window.fp) window.fp.setDate(val);
					}
				}

				if (input.type === 'radio') {
					input.checked = (input.value === val);
				} else if (input.id !== 'saleDateTime') {
					input.value = val;
				}
			});

			// Style submit button for edit mode
			const btnSave = document.querySelector('button[type="submit"].btn-save');
			btnSave.innerHTML = `
				<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
					<polyline points="17 21 17 13 7 13 7 21"></polyline>
					<polyline points="7 3 7 8 15 8"></polyline>
				</svg>
				儲存修改
			`;
			btnSave.style.background = 'linear-gradient(135deg, #f59e0b, #ea580c)';

			document.getElementById('btn-cancel').style.display = 'none';
			document.getElementById('btn-cancel-edit').style.display = 'flex';

			document.getElementById('form-container').scrollIntoView({ behavior: 'smooth' });
		};

		// Form submission -> Save to global array -> Display list
		document.getElementById('monitorForm').addEventListener('submit', function (e) {
			e.preventDefault();

			// ── 必填欄位驗證 ──
			if (!validateRequired()) return;

			const formData = new FormData(this);
			const record = {};

			const dt = document.getElementById('saleDateTime').value.trim();
			let datePart = '';
			let timePart = '';
			let dayStr = '';
			if (dt) {
				const parts = dt.split(' ');
				if (parts.length === 2) {
					datePart = parts[0];
					timePart = parts[1];
					const days = ['日', '一', '二', '三', '四', '五', '六'];
					dayStr = days[new Date(parts[0].replace(/-/g, '/')).getDay()];
				}
			}

			for (const [key, value] of formData.entries()) {
				if (key === '銷售日期時間') continue;
				record[key] = value.trim() === '' ? '(無)' : value;
			}
			
			record['開賣日期'] = datePart || '(無)';
			record['時間'] = timePart || '(無)';
			record['星期'] = dayStr || '(無)';

			// Special handle disabled input
			const otherMonitor = document.getElementById('otherMonitor').value.trim();
			record['其它單位監控'] = otherMonitor === '' ? '(無)' : otherMonitor;

			if (editIndex > -1) {
                record._id = recordsList[editIndex]._id;
				recordsList[editIndex] = record;
			} else {
                record._id = Date.now() + Math.random().toString(36).substr(2, 9);
				recordsList.push(record);
			}

			updateRecordsTable();
			resetFormHelper();

			// scroll to list smooth
			document.getElementById('multi-records-container').scrollIntoView({ behavior: 'smooth' });
		});

		// Submit All -> Send Email
		document.getElementById('btn-submit-all').addEventListener('click', async function () {
			if (recordsList.length === 0) return;

			let mailBody = '以下為監控申請內容：\n\n';
			let dataRowsHtml = '';

			// Sort by date (clone array)
			const sortedRecords = [...recordsList].sort((a, b) => {
				const dateA = new Date(a['開賣日期'] || '9999/12/31');
				const dateB = new Date(b['開賣日期'] || '9999/12/31');
				return dateA - dateB;
			});

			sortedRecords.forEach((record, index) => {
				mailBody += `========= 第 ${index + 1} 筆 =========\n`;
				for (const key in record) {
					mailBody += `${key}：${record[key]}\n`;
				}
				mailBody += '\n';

				const qQueue = record['排隊機制'];
				dataRowsHtml += `
					<tr>
						<td style="border: .5pt solid windowtext; vertical-align: middle; text-align: center; white-space: nowrap; padding:4px;">${index + 1}</td>
						<td style="border: .5pt solid windowtext; vertical-align: middle; text-align: center; white-space: nowrap; padding:4px;">${record['開賣日期']}</td>
						<td style="border: .5pt solid windowtext; vertical-align: middle; text-align: center; white-space: nowrap; padding:4px;">${record['星期']}</td>
						<td style="border: .5pt solid windowtext; vertical-align: middle; text-align: center; white-space: nowrap; padding:4px;">${record['時間']}</td>
						<td style="background-color: #C4D79B; border: .5pt solid windowtext; vertical-align: middle; text-align: center; white-space: nowrap; padding:4px;">${record['售票/核銷']}</td>
						<td style="background-color: #B7DEE8; border: .5pt solid windowtext; vertical-align: middle; text-align: center; white-space: nowrap; padding:4px;">${record['監控等級']}</td>
						<td style="border: .5pt solid windowtext; vertical-align: middle; text-align: center; white-space: nowrap; padding:4px;">${record['系統別']}</td>
						<td style="border: .5pt solid windowtext; vertical-align: middle; text-align: center; white-space: nowrap; padding:4px;">${record['A節目代碼/E活動分類']}</td>
						<td style="border: .5pt solid windowtext; vertical-align: middle; text-align: center; white-space: nowrap; padding:4px;">${record['活動名稱']}</td>
						<td style="background-color: #D9D9D9; border: .5pt solid windowtext; vertical-align: middle; text-align: center; white-space: nowrap; padding:4px;">${record['機器等級']}</td>
						<td style="border: .5pt solid windowtext; vertical-align: middle; text-align: center; white-space: nowrap; padding:4px;">${qQueue === '無' ? 'V' : ''}</td>
						<td style="border: .5pt solid windowtext; vertical-align: middle; text-align: center; white-space: nowrap; padding:4px;">${qQueue === '一般排隊' ? 'V' : ''}</td>
						<td style="border: .5pt solid windowtext; vertical-align: middle; text-align: center; white-space: nowrap; padding:4px;">${qQueue === '流管畫面' ? 'V' : ''}</td>
						<td style="background-color: #FFE699; border: .5pt solid windowtext; vertical-align: middle; text-align: center; white-space: nowrap; padding:4px;">${record['售票通路']}</td>
						<td style="border: .5pt solid windowtext; vertical-align: middle; text-align: center; white-space: nowrap; padding:4px;">${record['機台流管']}</td>
						<td style="border: .5pt solid windowtext; vertical-align: middle; text-align: center; white-space: nowrap; padding:4px;">${record['可售張數']}</td>
						<td style="border: .5pt solid windowtext; vertical-align: middle; text-align: center; white-space: nowrap; padding:4px;">${record['其它單位監控']}</td>
						<td style="border: .5pt solid windowtext; vertical-align: middle; text-align: left; white-space: pre-wrap; padding:4px; max-width:200px;">${record['特別說明']}</td>
						<td style="border: .5pt solid windowtext; vertical-align: middle; text-align: center; white-space: nowrap; padding:4px;">${record['負責業務']}</td>

			const emailReceiver = "Tammy_Chen@qware.com.tw";

			document.getElementById('result-content').innerHTML = summaryHtml;

			// Save to database — 使用 append 模式，只傳本次新增資料
			const btn = document.getElementById('btn-submit-all');

				const applyTime = new Date().toLocaleString('zh-TW');
				sortedRecords.forEach(r => {

				// append 模式：只傳新資料，GAS 後端負責讀取並合併
				const saveResult = await saveToGAS(sortedRecords, 'append');

				if (saveResult && saveResult.error) {

				mailItem.HTMLBody = mailHtmlBody; // Use HTMLBody for formatted table
				mailItem.Display();

				// For non-IE browsers, ActiveX will fail. 
				// We cannot use mailto: because it doesn't support HTML tables.
				// Solution: Generate an .eml file (Outlook draft) and trigger download.

				const emlSubject = "=?utf-8?B?" + btoa(unescape(encodeURIComponent(emailSubject))) + "?=";

				const emlContent = `To: ${emailReceiver}
Subject: ${emlSubject}
X-Unsent: 1
Content-Type: text/html; charset=utf-8

<html>
<head>
    <meta charset="UTF-8">
</head>
<body>
${mailHtmlBody}
</body>
</html>`;

				const today = new Date();
				const yyyy = today.getFullYear();

		// Back button
		document.getElementById('btn-back').addEventListener('click', function () {

		document.getElementById('btn-export').addEventListener('click', function () {

			// Sort by date (clone array to not mess up UI order)
			const sortedRecords = [...recordsList].sort((a, b) => {
				const dateA = new Date(a['開賣日期'] || '9999/12/31');
				const dateB = new Date(b['開賣日期'] || '9999/12/31');
				return dateA - dateB;

						<td class="td-data">${r['A節目代碼/E活動分類']}</td>

						<td class="td-yellow">${r['售票通路']}</td>

			let tableHtml = `
				<style>

					.th-ccc0da { background-color: #CCC0DA; border: .5pt solid windowtext; vertical-align: middle; text-align: center; font-weight: bold; white-space: nowrap; }

				<table style="border-collapse: collapse;">
					<tr>

		// ── 登入驗證 & 登出 ──
		const SESSION_KEY = 'monitoring_system_session';
		(function checkAuth() {
			const s = sessionStorage.getItem(SESSION_KEY);
			let session = null;
			try { session = JSON.parse(s); } catch(e) {}
			if (!session || !session.username) {
				window.location.href = 'login.html';
				return;
			}
			if (session.role !== 'admin') {
				const perms = session.permissions || [];
				if (!perms.includes('監控申請表單')) {
					alert('您沒有權限存取此頁面！');
					window.location.href = 'login.html';
					return;
				}
			}
			// 顯示帳號資訊
			const infoEl = document.getElementById('sidebar-user-info');
			if (infoEl) infoEl.textContent = session.name || session.username;
			// 管理員才顯示帳號管理連結
			if (session.role === 'admin') {
				const li = document.getElementById('li-admin-link');
				if (li) li.style.display = '';
			}
		})();

		document.getElementById('btn-logout').addEventListener('click', function(e) {
			e.preventDefault();
			if (confirm('確定要登出嗎？')) {
				sessionStorage.removeItem(SESSION_KEY);
				window.location.href = 'login.html';
			}
		});

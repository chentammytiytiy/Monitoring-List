<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>監控人員輪值表</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: rgba(0, 0, 0, 0.1);
            --input-bg: #ffffff;
            color-scheme: light;
        }

        body {
            margin: 0;
            font-family: 'Inter', "微軟正黑體", sans-serif;
            background: linear-gradient(135deg, #e2e8f0 0%, #f8fafc 100%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 200px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--border-color);
            padding: 1.5rem 0.8rem;
            box-shadow: 2px 0 15px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .sidebar-menu a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-menu a:hover {
            background: rgba(79, 70, 229, 0.1);
            color: var(--primary);
        }

        .sidebar-menu a.active {
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: white;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }

        .main-content {
            flex: 1;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.5rem;
            width: 100%;
            max-width: 98%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 2rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #c084fc, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .nav-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            background: rgba(79, 70, 229, 0.1);
            transition: all 0.2s;
        }

        .nav-link:hover {
            background: rgba(79, 70, 229, 0.2);
        }

        .search-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            background: rgba(0, 0, 0, 0.02);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            align-items: flex-end;
            max-width: fit-content;
        }

        .date-range-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .date-range-group input {
            width: 105px;
            text-align: center;
            padding: 0.6rem 0.5rem;
        }

        .date-range-group span {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.85rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--text-muted);
        }

        input,
        select {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.6rem 0.8rem;
            border-radius: 8px;
            font-size: 0.85rem;
            transition: all 0.3s;
            outline: none;
            font-family: inherit;
        }

        input:focus,
        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        .search-btn-container {
            display: flex;
            align-items: flex-end;
            gap: 0.8rem;
        }

        button.btn-clear {
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            height: 35px;
            min-width: 80px;
            transition: all 0.2s;
        }

        button.btn-clear:hover {
            background: rgba(0, 0, 0, 0.1);
            border-color: rgba(0, 0, 0, 0.3);
        }

        button.btn-search {
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            height: 35px;
            min-width: 90px;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
        }

        button.btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(79, 70, 229, 0.4);
        }

        /* Table Styling */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
        }

        thead {
            background: #f1f5f9;
        }

        th,
        td {
            padding: 0.3rem 0.4rem;
            text-align: left;
            font-size: 0.75rem;
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            letter-spacing: -0.01em;
        }

        th {
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
        }

        td {
            color: var(--text-main);
            white-space: nowrap;
        }

        td.col-name {
            white-space: nowrap;
            min-width: 25rem;
        }

        td.col-saleDate {
            white-space: nowrap;
            min-width: 140px;
        }

        td.col-time {
            white-space: nowrap;
            min-width: 70px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        th:last-child,
        td:last-child {
            border-right: none;
        }

        tbody tr {
            transition: background 0.15s;
        }

        tbody tr:hover {
            background: #f8fafc;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        #result-count {
            margin-bottom: 1rem;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .apply-time {
            font-size: 0.7rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* Pagination Styling */
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }

        .page-btn {
            background: #fff;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .page-btn:hover {
            background: #f1f5f9;
        }

        .page-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-edit {
            background: #e2e8f0;
            color: #475569;
            border: none;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .btn-edit:hover {
            background: #cbd5e1;
            color: #1e293b;
        }

        .btn-save {
            background: #34d399;
            color: white;
            border: none;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            display: none;
        }

        .btn-save:hover {
            background: #10b981;
        }

        .cell-input {
            width: 100%;
            min-width: 120px;
            box-sizing: border-box;
            padding: 0.2rem;
            font-size: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: #F8FAFC;
        }

        .btn-calendar {
            background: #f8fafc;
            color: #475569;
            border: 1px solid var(--border-color);
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            white-space: nowrap;
        }

        .btn-calendar:hover {
            background: #e2e8f0;
            color: var(--primary);
            border-color: #cbd5e1;
        }
    </style>
</head>

    <script>
        let allHistoricalRecords = [];
        let currentFilteredRecords = []; // Keep track of the currently displayed records for Excel export
        let currentPage = 1;
        const itemsPerPage = 50;

        // Initialize logic
        window.addToGoogleCalendar = function(idx) {
            const record = allHistoricalRecords[idx];
            if (!record) return;

            const title = record['活動名稱'] || '無標題活動';
            const dateStr = record['開賣日期'] || '';
            const timeStr = record['時間'] || '';
            
            let startStr = '';
            let endStr = '';

            const dateMatch = dateStr.match(/(\d{4})[^\d](\d{1,2})[^\d](\d{1,2})/);
            if (dateMatch) {
                const year = dateMatch[1];
                const month = dateMatch[2].padStart(2, '0');
                const day = dateMatch[3].padStart(2, '0');
                
                let hr = 0, min = 0;
                if (timeStr) {
                    const timeMatch = timeStr.match(/(\d{1,2})[:：](\d{2})/);
                    if (timeMatch) {
                        hr = parseInt(timeMatch[1], 10);
                        min = parseInt(timeMatch[2], 10);
                    } else {
                        const numMatch = timeStr.match(/(\d{1,2})/);
                        if (numMatch) {
                            hr = parseInt(numMatch[1], 10);
                        }
                    }
                }
                
                const startDate = new Date(parseInt(year), parseInt(month) - 1, parseInt(day), hr, min);
                const endDate = new Date(startDate.getTime() + 60 * 60 * 1000); // 預設加1小時

                const formatGoogleDate = (d) => {
                    return d.getFullYear() +
                        String(d.getMonth() + 1).padStart(2, '0') +
                        String(d.getDate()).padStart(2, '0') + 'T' +
                        String(d.getHours()).padStart(2, '0') +
                        String(d.getMinutes()).padStart(2, '0') + '00';
                };

                startStr = formatGoogleDate(startDate);
                endStr = formatGoogleDate(endDate);
            }

            let url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&ctz=Asia/Taipei`;
            if (startStr && endStr) {
                url += `&dates=${startStr}/${endStr}`;
            }
            window.open(url, '_blank');
        };

        window.updateRecordTemp = function(idx, key, value) {
            const record = allHistoricalRecords[idx];
            if (!record._modified) record._modified = [];
            if (record[key] !== value) {
                if (!record._modified.includes(key)) record._modified.push(key);
                record[key] = value;
                record['申請時間'] = new Date().toLocaleString('zh-TW') + ' (已更新人員輪值)';
            }
        };

        window.onload = function () {
            try {
                const data = localStorage.getItem('appliedMonitorRecords');
                if (data) {
                    allHistoricalRecords = JSON.parse(data);
                }
            } catch (e) {
                console.error("無法讀取歷史資料:", e);
            }

            // By default initially, show all but sorted correctly
            // We need to trigger the search flow so pagination resets properly
            document.getElementById('btn-search').click();
        };

        // Clear button click
        document.getElementById('btn-clear').addEventListener('click', function () {
            document.getElementById('search-date-start').value = '';
            document.getElementById('search-date-end').value = '';
            document.getElementById('search-code').value = '';
            document.getElementById('search-system').value = '';
            
            // Reset dates placeholder behavior
            document.getElementById('search-date-start').type = 'text';
            document.getElementById('search-date-end').type = 'text';

            document.getElementById('btn-search').click();
        });

        // Search button click
        document.getElementById('btn-search').addEventListener('click', function () {
            const sDateStart = document.getElementById('search-date-start').value.trim();
            const sDateEnd = document.getElementById('search-date-end').value.trim();
            const sCodeOrName = document.getElementById('search-code').value.trim().toLowerCase();
            const sSystem = document.getElementById('search-system').value;

            // Convert boundaries to Comparable Date objects if they exist
            let dStart = null, dEnd = null;
            if (sDateStart) dStart = new Date(sDateStart);
            if (sDateEnd) {
                // To include the entire end day, we could technically append 23:59:59 but 
                // since the record saleDate doesn't usually have a time component, simple Date comparison is fine.
                dEnd = new Date(sDateEnd);
            }

            const filtered = allHistoricalRecords.filter(record => {
                let match = true;

                // 1. Date Range check
                if (dStart || dEnd) {
                    const recDateStr = record['開賣日期'];
                    if (!recDateStr) {
                        match = false;
                    } else {
                        // Attempt to parse exactly "yyyy/mm/dd" correctly
                        // The recorded format is usually yyyy/mm/dd mapping cleanly
                        const recDate = new Date(recDateStr);
                        if (!isNaN(recDate.getTime())) {
                            if (dStart && recDate < dStart) match = false;
                            if (dEnd && recDate > dEnd) match = false;
                        } else {
                            // Fallback string manipulation if parsing failed
                            match = false; // hard to compare range on totally malformed date strings
                        }
                    }
                }

                // 2. Code or Name check (A節目代碼/E活動分類 OR 活動名稱)
                if (sCodeOrName && match) {
                    const code = (record['A節目代碼/E活動分類'] || '').toLowerCase();
                    const name = (record['活動名稱'] || '').toLowerCase();
                    if (!code.includes(sCodeOrName) && !name.includes(sCodeOrName)) {
                        match = false;
                    }
                }

                // 3. System check
                if (sSystem && match) {
                    if (record['系統別'] !== sSystem) {
                        match = false;
                    }
                }

                return match;
            });

            // Re-sort data descending by "開賣日期"
            const sortedBySaleDate = [...filtered].sort((a, b) => {
                // Parse correctly, fallback to epoch if missing
                const dateA = new Date(a['開賣日期'] || parseInt(a['申請時間']));
                const dateB = new Date(b['開賣日期'] || parseInt(b['申請時間']));
                return dateB - dateA;
            });

            currentFilteredRecords = sortedBySaleDate;
            currentPage = 1; // Reset to page 1 on new search
            renderTablePaginated();

            // Enable/Disable Excel button based on results
            const excelBtn = document.getElementById('btn-export-excel');
            if (sortedBySaleDate.length > 0) {
                excelBtn.removeAttribute('disabled');
                excelBtn.style.opacity = '1';
                excelBtn.style.cursor = 'pointer';
            } else {
                excelBtn.setAttribute('disabled', 'true');
                excelBtn.style.opacity = '0.5';
                excelBtn.style.cursor = 'not-allowed';
            }
        });

        function changePage(page) {
            currentPage = page;
            renderTablePaginated();
        }

        function renderPaginationControls(totalItems) {
            const paginationDiv = document.getElementById('pagination');
            if (totalItems <= itemsPerPage) {
                paginationDiv.innerHTML = '';
                return;
            }

            const totalPages = Math.ceil(totalItems / itemsPerPage);
            let html = `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">上一頁</button>`;

            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            }

            html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">下一頁</button>`;

            paginationDiv.innerHTML = html;
        }

        function renderTablePaginated() {
            const tbody = document.getElementById('results-tbody');
            const countDiv = document.getElementById('result-count');

            const dataArray = currentFilteredRecords;

            if (!dataArray || dataArray.length === 0) {
                countDiv.innerHTML = `共找到 <strong style="color:var(--text-main);">0</strong> 筆資料`;
                tbody.innerHTML = `<tr><td colspan="18" class="empty-state">查無符合條件的監控資料</td></tr>`;
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            countDiv.innerHTML = `共找到 <strong style="color:var(--primary); font-size:1.1rem;">${dataArray.length}</strong> 筆已送出的申請資料`;

            // Slice for current page
            const startIndex = (currentPage - 1) * itemsPerPage;
            const pageData = dataArray.slice(startIndex, startIndex + itemsPerPage);

            const selectOptions = {
                'pm': ['X', '陳詩恬', '黃晏瑜', '張家菁', '李聿芸'],
                'it_a': ['X', '廖崇智', '謝正軒', '張宏偉', '鄒易恆'],
                'it_cash': ['X', '陳利和'],
                'it_d': ['X', '黃陸堃'],
                'it_q': ['X', '黃俊傑', '陳嘉啟'],
                'it_e': ['X', '黃士哲']
            };

            const buildSelectHtml = (colType, recordKey, val, origIdx) => {
                const opts = selectOptions[colType] || [];
                let optionsHtml = opts.map(opt => `<option value="${opt}" ${val === opt ? 'selected' : ''}>${opt}</option>`).join('');
                if (!opts.includes(val) && val) {
                    optionsHtml = `<option value="${val}" selected>${val}</option>` + optionsHtml;
                }
                return `<select class="cell-input" onchange="updateRecordTemp(${origIdx}, '${recordKey}', this.value)">${optionsHtml}</select>`;
            };

            const buildInputHtml = (recordKey, val, origIdx) => {
                const currentVal = val || '';
                return `<input type="text" class="cell-input" style="min-width: 150px;" onchange="updateRecordTemp(${origIdx}, '${recordKey}', this.value)" value="${currentVal}">`;
            };

            let html = '';
            pageData.forEach((r, idx) => {
                const origIdx = allHistoricalRecords.indexOf(r);
                const mods = r._modified || [];
                // Helper to conditionally apply red color if modified
                const c = (key) => mods.includes(key) ? 'color: #dc2626; font-weight: 700;' : '';

                html += `
					<tr data-index="${origIdx}">
						<td class="apply-time">${r['申請時間'] || '-'}</td>
						<td class="col-saleDate" style="${c('開賣日期')}">${r['開賣日期'] ? `${r['開賣日期']} (${r['星期'] || ''})` : '-'}</td>
						<td class="col-time" style="${c('時間')}">${r['時間'] || '-'}</td>
						<td class="col-action" style="${c('售票/核銷')}">${r['售票/核銷'] || '-'}</td>
						<td class="col-sys" style="${c('系統別')}">${r['系統別'] || '-'}</td>
						<td class="col-code" style="${c('A節目代碼/E活動分類')}">${r['A節目代碼/E活動分類'] || '-'}</td>
						<td class="col-name" style="${c('活動名稱')}">${r['活動名稱'] || '-'}</td>
						<td class="col-level" style="${c('監控等級')}">${r['監控等級'] || '-'}</td>
						<td class="col-machine" style="${c('機器等級')}">${r['機器等級'] || '-'}</td>
						<td class="col-queue" style="${c('排隊機制')}">${r['排隊機制'] || '-'}</td>
						<td class="col-channel" style="${c('售票通路')}">${r['售票通路'] || '-'}</td>
						<td class="col-pm">${buildSelectHtml('pm', '監控PM', r['監控PM'], origIdx)}</td>
						<td class="col-it_a">${buildSelectHtml('it_a', 'A系統+會員IT', r['A系統+會員IT'], origIdx)}</td>
						<td class="col-it_cash">${buildSelectHtml('it_cash', '金流IT', r['金流IT'], origIdx)}</td>
						<td class="col-it_d">${buildSelectHtml('it_d', 'D系統IT', r['D系統IT'], origIdx)}</td>
						<td class="col-it_q">${buildSelectHtml('it_q', 'Q系統IT', r['Q系統IT'], origIdx)}</td>
						<td class="col-it_e">${buildSelectHtml('it_e', 'E系統IT', r['E系統IT'], origIdx)}</td>
						<td class="col-calendar">
							<button type="button" class="btn-calendar" title="加入Google行事曆" onclick="addToGoogleCalendar(${origIdx})">
								<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
								加入
							</button>
						</td>
					</tr>
				`;
            });

            tbody.innerHTML = html;
            renderPaginationControls(dataArray.length);
        }

        document.getElementById('btn-save-all').addEventListener('click', function () {
            localStorage.setItem('appliedMonitorRecords', JSON.stringify(allHistoricalRecords));
            alert('已成功儲存監控人員輪值表資料！');
            document.getElementById('btn-search').click();
        });

        // Enable Enter key on inputs to trigger search
        document.querySelectorAll('.search-grid input, .search-grid select').forEach(el => {
            el.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    document.getElementById('btn-search').click();
                }
            });
        });

        // Export search results to Excel
        document.getElementById('btn-export-excel').addEventListener('click', function () {
            if (currentFilteredRecords.length === 0) return;

            let dataRows = '';

            // Sort by sale date chronologically (oldest first)
            const sortedRecords = [...currentFilteredRecords].sort((a, b) => {
                const dateA = new Date(a['開賣日期'] || '9999/12/31');
                const dateB = new Date(b['開賣日期'] || '9999/12/31');
                return dateA - dateB;
            });

            // Map each column to match exact colors and modifications
            sortedRecords.forEach((r, idx) => {
                const qQueue = r['排隊機制'];
                const mods = r._modified || [];
                const s = (key, baseCls) => mods.includes(key) ? `class="${baseCls}" style="color: red; font-weight: bold;"` : `class="${baseCls}"`;

                dataRows += `
                    <tr>
                        <td class="td-data">${idx + 1}</td>
                        <td ${s('開賣日期', 'td-data')}>${r['開賣日期']}</td>
                        <td class="td-data">${r['星期'] || ''}</td>
                        <td ${s('時間', 'td-data')}>${r['時間']}</td>
                        <td ${s('售票/核銷', 'td-green')}>${r['售票/核銷']}</td>
                        <td ${s('監控等級', 'td-blue')}>${r['監控等級']}</td>
                        <td ${s('系統別', 'td-data')}>${r['系統別']}</td>
                        <td ${s('A節目代碼/E活動分類', 'td-data')}>${r['A節目代碼/E活動分類']}</td>
                        <td ${s('活動名稱', 'td-data')}>${r['活動名稱']}</td>
                        <td ${s('機器等級', 'td-gray')}>${r['機器等級']}</td>
                        <td class="td-data">${qQueue === '無' ? 'V' : ''}</td>
                        <td class="td-data">${qQueue === '一般排隊' ? 'V' : ''}</td>
                        <td class="td-data">${qQueue === '流管畫面' ? 'V' : ''}</td>
                        <td ${s('售票通路', 'td-yellow')}>${r['售票通路']}</td>
                        <td class="td-data">${r['機台流管'] || ''}</td>
                        <td class="td-data">${r['可售張數'] || ''}</td>
                        <td class="td-data">${r['其它單位監控'] || ''}</td>
                        <td class="td-data">${r['特別說明'] || ''}</td>
                        <td ${s('負責業務', 'td-data')}>${r['負責業務'] || ''}</td>
                        <td ${s('建檔OP', 'td-data')}>${r['建檔OP'] || ''}</td>
                        <td ${s('監控PM', 'td-data')}>${r['監控PM'] || ''}</td>
                        <td ${s('A系統+會員IT', 'td-data')}>${r['A系統+會員IT'] || ''}</td>
                        <td ${s('金流IT', 'td-data')}>${r['金流IT'] || ''}</td>
                        <td ${s('D系統IT', 'td-data')}>${r['D系統IT'] || ''}</td>
                        <td ${s('Q系統IT', 'td-data')}>${r['Q系統IT'] || ''}</td>
                        <td ${s('E系統IT', 'td-data')}>${r['E系統IT'] || ''}</td>
                    </tr>
                `;
            });

            let tableHtml = `
                <style>
                    .th-fde9d9 { background-color: #FDE9D9; border: .5pt solid windowtext; vertical-align: middle; text-align: center; font-weight: bold; white-space: nowrap; }
                    .th-daeef3 { background-color: #DAEEF3; border: .5pt solid windowtext; vertical-align: middle; text-align: center; font-weight: bold; white-space: nowrap; }
                    .th-d8e4bc { background-color: #D8E4BC; border: .5pt solid windowtext; vertical-align: middle; text-align: center; font-weight: bold; white-space: nowrap; }
                    .th-ccc0da { background-color: #CCC0DA; border: .5pt solid windowtext; vertical-align: middle; text-align: center; font-weight: bold; white-space: nowrap; }
                    .td-data { border: .5pt solid windowtext; vertical-align: middle; text-align: center; white-space: nowrap; }
                    .td-green { background-color: #C4D79B; border: .5pt solid windowtext; vertical-align: middle; text-align: center; white-space: nowrap; }
                    .td-blue { background-color: #B7DEE8; border: .5pt solid windowtext; vertical-align: middle; text-align: center; white-space: nowrap; }
                    .td-gray { background-color: #D9D9D9; border: .5pt solid windowtext; vertical-align: middle; text-align: center; white-space: nowrap; }
                    .td-yellow { background-color: #FFE699; border: .5pt solid windowtext; vertical-align: middle; text-align: center; white-space: nowrap; }
                </style>
                <table style="border-collapse: collapse;">
                    <tr>
                        <th class="th-fde9d9" rowspan="2">項次</th>
                        <th class="th-fde9d9" rowspan="2">開賣日期</th>
                        <th class="th-fde9d9" rowspan="2">星期</th>
                        <th class="th-fde9d9" rowspan="2">時間</th>
                        <th class="th-daeef3" rowspan="2">售票/核銷</th>
                        <th class="th-daeef3" rowspan="2">監控等級</th>
                        <th class="th-fde9d9" rowspan="2">系統別</th>
                        <th class="th-fde9d9" rowspan="2">A節目代碼/<br>E活動分類</th>
                        <th class="th-fde9d9" rowspan="2">活動名稱</th>
                        <th class="th-d8e4bc" rowspan="2">機器等級</th>
                        <th class="th-fde9d9" colspan="3">排隊機制</th>
                        <th class="th-ccc0da" rowspan="2">售票通路</th>
                        <th class="th-fde9d9" rowspan="2">機台<br>流管</th>
                        <th class="th-fde9d9" rowspan="2">可售<br>張數</th>
                        <th class="th-fde9d9" rowspan="2">其它單位監控</th>
                        <th class="th-fde9d9" rowspan="2">特別說明</th>
                        <th class="th-fde9d9" rowspan="2">負責業務</th>
                        <th class="th-fde9d9" rowspan="2">建檔人員</th>
                        <th class="th-fde9d9" rowspan="2">監控PM</th>
                        <th class="th-fde9d9" rowspan="2">A系統+會員IT</th>
                        <th class="th-fde9d9" rowspan="2">金流IT</th>
                        <th class="th-fde9d9" rowspan="2">D系統IT</th>
                        <th class="th-fde9d9" rowspan="2">Q系統IT</th>
                        <th class="th-fde9d9" rowspan="2">E系統IT</th>
                    </tr>
                    <tr>
                        <th class="th-fde9d9">無</th>
                        <th class="th-fde9d9">一般排隊</th>
                        <th class="th-fde9d9">流管畫面</th>
                    </tr>
                    ${dataRows}
                </table>
            `;

            // Wrap in exact excel xml schema meta
            const excelFile = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>歷史監控資料</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head><body>${tableHtml}</body></html>`;

            const blob = new Blob([excelFile], { type: 'application/vnd.ms-excel;charset=utf-8' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');

            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const hh = String(today.getHours()).padStart(2, '0');
            const min = String(today.getMinutes()).padStart(2, '0');

            a.href = url;
            a.download = `監控一覽表_${yyyy}${mm}${dd}.xls`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        });
    </script>
</body>

</html>

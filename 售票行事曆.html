<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>售票行事曆</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: rgba(0, 0, 0, 0.1);
            --input-bg: #ffffff;
            color-scheme: light;
        }

        body {
            margin: 0;
            font-family: 'Inter', "微軟正黑體", sans-serif;
            background: linear-gradient(135deg, #e2e8f0 0%, #f8fafc 100%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 200px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--border-color);
            padding: 1.5rem 0.8rem;
            box-shadow: 2px 0 15px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .sidebar-menu a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-menu a:hover {
            background: rgba(79, 70, 229, 0.1);
            color: var(--primary);
        }

        .sidebar-menu a.active {
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: white;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }

        .main-content {
            flex: 1;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.5rem;
            width: 100%;
            max-width: 98%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 2rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #c084fc, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .nav-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            background: rgba(79, 70, 229, 0.1);
            transition: all 0.2s;
        }

        .nav-link:hover {
            background: rgba(79, 70, 229, 0.2);
        }

        .search-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            background: rgba(0, 0, 0, 0.02);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            align-items: flex-end;
            max-width: fit-content;
        }

        .date-range-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .date-range-group input {
            width: 105px;
            text-align: center;
            padding: 0.6rem 0.5rem;
        }

        .date-range-group span {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.85rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--text-muted);
        }

        input,
        select {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.6rem 0.8rem;
            border-radius: 8px;
            font-size: 0.85rem;
            transition: all 0.3s;
            outline: none;
            font-family: inherit;
        }

        input:focus,
        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        .search-btn-container {
            display: flex;
            align-items: flex-end;
            gap: 0.8rem;
        }

        button.btn-clear {
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            height: 35px;
            min-width: 80px;
            transition: all 0.2s;
        }

        button.btn-clear:hover {
            background: rgba(0, 0, 0, 0.1);
            border-color: rgba(0, 0, 0, 0.3);
        }

        button.btn-search {
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            height: 35px;
            min-width: 90px;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
        }

        button.btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(79, 70, 229, 0.4);
        }

        /* Table Styling */
        .fc-event-main {
            white-space: normal !important;
            font-size: 0.8rem;
            padding: 2px 4px;
        }
        .fc-event {
            border-radius: 4px;
            margin-bottom: 2px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="sidebar-title">系統選單</div>
        <ul class="sidebar-menu">
            <li>
                <a href="監控表.html">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    監控申請表單
                </a>
            </li>
            <li>
                <a href="更新監控表單.html">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    查詢及更新監控表單
                </a>
            </li>
            <li>
                <a href="監控人員輪值表.html">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    監控人員輪值表
                </a>
            </li>
            <li>
                <a href="售票行事曆.html" class="active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    售票行事曆
                </a>
            </li>
        </ul>
    </div>

    <div class="main-content">
        <div class="container">
        <div class="header-row">
            <h1>售票行事曆</h1>
            <div style="display:flex; gap: 0.5rem;">
                <button type="button" class="nav-link" id="btn-export-excel" style="border:none; cursor:pointer;"
                    disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    匯出 Excel
                </button>
            </div>
        </div>

        <div class="search-grid">
            <div class="form-group">
                <label for="search-year">查詢年度</label>
                <select id="search-year">
                    <!-- Years will be populated by JS -->
                </select>
            </div>
            
            <div class="search-btn-container">
                <button type="button" class="btn-search" id="btn-search">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    查詢
                </button>
            </div>
        </div>

        <div id="calendar" style="height: 600px; margin-top: 1rem;"></div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/zh-tw.js"></script>
    <script>
        let allHistoricalRecords = [];
        let calendar;

        window.onload = function () {
            try {
                const data = localStorage.getItem('appliedMonitorRecords');
                if (data) {
                    allHistoricalRecords = JSON.parse(data);
                }
            } catch (e) {
                console.error("無法讀取歷史資料:", e);
            }

            // Setup year dropdown
            const yearSelect = document.getElementById('search-year');
            const currentYear = new Date().getFullYear();
            for (let i = currentYear - 2; i <= currentYear + 2; i++) {
                let opt = document.createElement('option');
                opt.value = i;
                opt.textContent = i + '年';
                if (i === currentYear) opt.selected = true;
                yearSelect.appendChild(opt);
            }

            // Initialize Calendar
            var calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                locale: 'zh-tw',
                initialView: 'dayGridMonth',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,listYear'
                },
                initialDate: new Date(currentYear, 0, 1),
                eventContent: function(arg) {
                    let titleHtml = `<div style="font-weight:bold; color:var(--primary); line-height: 1.4; font-size: 0.85rem; word-break: break-all; white-space: normal;">${arg.timeText} ${arg.event.title}</div>`;
                    let propsText = '';
                    
                    const props = arg.event.extendedProps;
                    let labels = [];
                    if (props.pm && props.pm !== 'X') labels.push(`PM:${props.pm}`);
                    if (props.itA && props.itA !== 'X') labels.push(`A:${props.itA}`);
                    if (props.itCash && props.itCash !== 'X') labels.push(`金:${props.itCash}`);
                    if (props.itD && props.itD !== 'X') labels.push(`D:${props.itD}`);
                    if (props.itQ && props.itQ !== 'X') labels.push(`Q:${props.itQ}`);
                    if (props.itE && props.itE !== 'X') labels.push(`E:${props.itE}`);
                    
                    if (labels.length > 0) {
                        propsText = `<div style="font-size: 0.75rem; color: #475569; margin-top: 4px; line-height: 1.3; white-space: normal; word-break: break-all;">${labels.join(' ')}</div>`;
                    }
                    
                    return { html: `<div style="padding: 2px 4px; display: flex; flex-direction: column;">${titleHtml}${propsText}</div>` };
                }
            });
            calendar.render();

            document.getElementById('btn-search').click();
        };

        document.getElementById('btn-search').addEventListener('click', function () {
            const year = document.getElementById('search-year').value;
            calendar.gotoDate(year + '-01-01');

            const filtered = allHistoricalRecords.filter(r => {
                const dateStr = r['開賣日期'] || '';
                const isTicketSale = r['售票/核銷'] === '售票';
                return dateStr.startsWith(year) && isTicketSale;
            });

            // Re-map to calendar events
            const events = filtered.map(r => {
                let dateStr = r['開賣日期'].replace(/\//g, '-');
                let timeStr = (r['時間'] && r['時間'] !== '(無)') ? r['時間'] : '';
                
                // Parse time if it's there
                let hr = '00', min = '00';
                if (timeStr) {
                    const timeMatch = timeStr.match(/(\d{1,2})[:：](\d{2})/);
                    if (timeMatch) {
                        hr = timeMatch[1].padStart(2, '0');
                        min = timeMatch[2].padStart(2, '0');
                    } else {
                        const numMatch = timeStr.match(/(\d{1,2})/);
                        if (numMatch) {
                            hr = numMatch[1].padStart(2, '0');
                        }
                    }
                }

                let dt = dateStr + (timeStr ? 'T' + hr + ':' + min + ':00' : '');
                
                return {
                    title: r['活動名稱'] || r['A節目代碼/E活動分類'] || '未命名活動',
                    start: dt,
                    allDay: !timeStr,
                    extendedProps: {
                        pm: r['監控PM'],
                        itA: r['A系統+會員IT'],
                        itCash: r['金流IT'],
                        itD: r['D系統IT'],
                        itQ: r['Q系統IT'],
                        itE: r['E系統IT']
                    }
                };
            });

            calendar.removeAllEvents();
            calendar.addEventSource(events);
        });

    </script>
</body>

</html>

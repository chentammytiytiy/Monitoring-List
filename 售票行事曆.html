<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>售票行事曆</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: rgba(0, 0, 0, 0.1);
            --input-bg: #ffffff;
            color-scheme: light;
        }

        body {
            margin: 0;
            font-family: 'Inter', "微軟正黑體", sans-serif;
            background: linear-gradient(135deg, #e2e8f0 0%, #f8fafc 100%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 200px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--border-color);
            padding: 1.5rem 0.8rem;
            box-shadow: 2px 0 15px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .sidebar-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            flex: 1;
        }

        .sidebar-menu a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-menu a:hover {
            background: rgba(79, 70, 229, 0.1);
            color: var(--primary);
        }

        .sidebar-menu a.active {
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: white;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }

        .sidebar-divider {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 0.4rem 0;
        }

        .sidebar-logout a {
            text-decoration: none;
            color: #ef4444;
            font-size: 0.88rem;
            font-weight: 600;
            padding: 0.7rem 1rem;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .sidebar-logout a:hover {
            background: rgba(239, 68, 68, 0.08);
        }

        .sidebar-user {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            padding: 0.5rem 0.5rem 0;
            line-height: 1.4;
        }

        .main-content {
            flex: 1;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.5rem;
            width: 100%;
            max-width: 98%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 2rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #c084fc, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .nav-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            background: rgba(79, 70, 229, 0.1);
            transition: all 0.2s;
        }

        .nav-link:hover {
            background: rgba(79, 70, 229, 0.2);
        }

        .search-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            background: rgba(0, 0, 0, 0.02);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            align-items: flex-end;
            max-width: fit-content;
        }

        .date-range-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .date-range-group input {
            width: 105px;
            text-align: center;
            padding: 0.6rem 0.5rem;
        }

        .date-range-group span {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.85rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--text-muted);
        }

        input,
        select {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.6rem 0.8rem;
            border-radius: 8px;
            font-size: 0.85rem;
            transition: all 0.3s;
            outline: none;
            font-family: inherit;
        }

        input:focus,
        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        .search-btn-container {
            display: flex;
            align-items: flex-end;
            gap: 0.8rem;
        }

        button.btn-clear {
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            height: 35px;
            min-width: 80px;
            transition: all 0.2s;
        }

        button.btn-clear:hover {
            background: rgba(0, 0, 0, 0.1);
            border-color: rgba(0, 0, 0, 0.3);
        }

        button.btn-search {
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            height: 35px;
            min-width: 90px;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
        }

        button.btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(79, 70, 229, 0.4);
        }

        /* Table Styling */
        .fc-event-main {
            white-space: normal !important;
            font-size: 0.8rem;
            padding: 2px 4px;
        }

        .fc-event {
            border-radius: 4px;
            margin-bottom: 2px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="sidebar-title">系統選單</div>
        <ul class="sidebar-menu">
            <li>

            <li>

            <li>

            <li>

                        stroke-linecap="round" stroke-linejoin="round">

                        <line x1="16" y1="2" x2="16" y2="6"></line>

            <li id="li-admin-link" style="display:none;">
                <a href="帳號管理.html">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><line x1="17" y1="11" x2="23" y2="11"></line><line x1="20" y1="8" x2="20" y2="14"></line></svg>

                </a>

        </ul>
        <div class="sidebar-user" id="sidebar-user-info"></div>

            <a href="#" id="btn-logout">

    <div class="main-content">
        <div class="container">
            <div class="header-row">
                <h1>售票行事曆</h1>
                <div style="display:flex; gap: 0.5rem;">
                    <button type="button" class="nav-link" id="btn-export-excel" style="border:none; cursor:pointer;"
                        disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"

                            <line x1="12" y1="15" x2="12" y2="3"></line>

                    </button>
                </div>
            </div>

            <div class="search-grid">
                <div class="form-group">
                    <label for="search-year">查詢年度</label>
                    <select id="search-year">
                        <!-- Years will be populated by JS -->
                    </select>
                </div>

                <div class="form-group">
                    <label for="search-month">查詢月份</label>
                    <select id="search-month">
                        <option value="">全部月份</option>
                        <option value="01">1月</option>
                        <option value="02">2月</option>
                        <option value="03">3月</option>
                        <option value="04">4月</option>
                        <option value="05">5月</option>
                        <option value="06">6月</option>
                        <option value="07">7月</option>
                        <option value="08">8月</option>
                        <option value="09">9月</option>
                        <option value="10">10月</option>
                        <option value="11">11月</option>
                        <option value="12">12月</option>
                    </select>
                </div>

                <div class="search-btn-container">
                    <button type="button" class="btn-search" id="btn-search">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/zh-tw.js"></script>
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxlVEL8SwA5hy28n2-6TgQGG1cd0rhG81azxr4nlUwy-c6lqtODZHrwI5yeOOAfb5vC7A/exec';
        let allHistoricalRecords = [];
        let calendar;

        window.onload = async function () {
            // Show loading placeholder initially
            document.getElementById('calendar').innerHTML = '<div style="text-align:center; padding:3rem; color:var(--text-muted);">資料載入中，請稍候...</div>';

            try {
                const response = await fetch(`${SCRIPT_URL}?t=${new Date().getTime()}`);
                allHistoricalRecords = await response.json();
                document.getElementById('calendar').innerHTML = ''; // clear loading text
            } catch (e) {
                console.error("無法讀取資料庫資料:", e);
                document.getElementById('calendar').innerHTML = '<div style="text-align:center; padding:3rem; color:red;">讀取資料失敗，請重新整理頁面。</div>';
                return;
            }

            // Setup year dropdown
            const yearSelect = document.getElementById('search-year');
            const currentYear = new Date().getFullYear();
            for (let i = currentYear - 2; i <= currentYear + 2; i++) {
                let opt = document.createElement('option');
                opt.value = i;
                opt.textContent = i + '年';
                if (i === currentYear) opt.selected = true;
                yearSelect.appendChild(opt);
            }

            // Pre-select current month
            const monthSelect = document.getElementById('search-month');
            const currentMonth = String(new Date().getMonth() + 1).padStart(2, '0');
            monthSelect.value = currentMonth;

            // Initialize Calendar
            var calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                locale: 'zh-tw',
                initialView: 'dayGridMonth',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,listYear'
                },
                initialDate: new Date(currentYear, 0, 1),
                eventContent: function (arg) {
                    let titleHtml = `<div style="font-weight:bold; color:var(--primary); line-height: 1.4; font-size: 0.85rem; word-break: break-all; white-space: normal;">${arg.timeText} ${arg.event.title}</div>`;
                    let propsText = '';

                    const props = arg.event.extendedProps;
                    let labels = [];
                    if (props.sys) labels.push(`系統:${props.sys}`);
                    if (props.level) labels.push(`等級:${props.level}`);
                    if (props.owner) labels.push(`負責:${props.owner}`);

                    if (labels.length > 0) {
                        propsText = `<div style="font-size: 0.75rem; color: #475569; margin-top: 4px; line-height: 1.3; white-space: normal; word-break: break-all;">${labels.join(' ')}</div>`;
                    }

                    return { html: `<div style="padding: 2px 4px; display: flex; flex-direction: column;">${titleHtml}${propsText}</div>` };
                }
            });
            calendar.render();

            document.getElementById('btn-search').click();
        };

        document.getElementById('btn-search').addEventListener('click', function () {
            const year = document.getElementById('search-year').value;
            const month = document.getElementById('search-month').value;

            if (month) {
                calendar.gotoDate(`${year}-${month}-01`);
            } else {
                calendar.gotoDate(year + '-01-01');
            }

            const filtered = allHistoricalRecords.filter(r => {
                const dateStr = r['開賣日期'] || '';
                if (!dateStr) return false;
                const isTicketSale = r['售票/核銷'] === '售票';

                let matchesDate = false;
                const d = new Date(dateStr);
                if (!isNaN(d.getTime())) {
                    if (month) {
                        matchesDate = (d.getFullYear() == year && (d.getMonth() + 1) == parseInt(month, 10));
                    } else {
                        matchesDate = (d.getFullYear() == year);
                    }
                }

                return matchesDate && isTicketSale;
            });

            // Re-map to calendar events
            const events = filtered.map(r => {
                const d = new Date(r['開賣日期']);
                const yyyy = d.getFullYear();
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                let dateStr = `${yyyy}-${mm}-${dd}`;

                let timeStr = (r['時間'] && r['時間'] !== '(無)') ? r['時間'] : '';

                // Parse time if it's there
                let hr = '00', min = '00';
                if (timeStr) {
                    const timeMatch = timeStr.match(/(\d{1,2})[:：](\d{2})/);
                    if (timeMatch) {
                        hr = timeMatch[1].padStart(2, '0');
                        min = timeMatch[2].padStart(2, '0');
                    } else {
                        const numMatch = timeStr.match(/(\d{1,2})/);
                        if (numMatch) {
                            hr = numMatch[1].padStart(2, '0');
                        }
                    }
                }

                let dt = dateStr + (timeStr ? 'T' + hr + ':' + min + ':00' : '');

                return {
                    title: r['活動名稱'] || r['A節目代碼/E活動分類'] || '未命名活動',
                    start: dt,
                    allDay: !timeStr,
                    extendedProps: {
                        sys: r['系統別'],
                        level: r['監控等級'],
                        owner: r['負責業務']
                    }
                };
            });

            calendar.removeAllEvents();
            calendar.addEventSource(events);
        });
        // ── 登入驗證 & 登出 ──
        const SESSION_KEY = 'monitoring_system_session';
        (function checkAuth() {
            const s = sessionStorage.getItem(SESSION_KEY);
            let session = null;
            try { session = JSON.parse(s); } catch(e) {}
            if (!session || !session.username) {
                window.location.href = 'login.html';
                return;
            }

            // 頁面權限檢查
            const pageName = '售票行事曆';
            if (session.role !== 'admin' && session.permissions && !session.permissions.includes(pageName)) {
                alert('您沒有權限存取此頁面！');
                window.location.href = 'login.html'; 
                return;
            }

            const infoEl = document.getElementById('sidebar-user-info');
            if (infoEl) infoEl.textContent = session.name || session.username;
            if (session.role === 'admin') {
                const li = document.getElementById('li-admin-link');
                if (li) li.style.display = '';
            }
        })();

        document.getElementById('btn-logout').addEventListener('click', function(e) {
            e.preventDefault();
            if (confirm('確定要登出嗎？')) {
                sessionStorage.removeItem(SESSION_KEY);
                window.location.href = 'login.html';
            }
        });
    </script>

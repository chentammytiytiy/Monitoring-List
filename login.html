<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>監控管理系統 — 登入</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --gradient-start: #4f46e5;
            --gradient-end: #a855f7;
        }

        body {
            font-family: 'Inter', "微軟正黑體", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            overflow: hidden;
            position: relative;
        }

        /* Animated background orbs */
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 8s ease-in-out infinite;
            pointer-events: none;
        }

        .bg-orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #4f46e5, transparent);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .bg-orb-2 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #a855f7, transparent);
            bottom: -80px;
            right: -80px;
            animation-delay: -3s;
        }

        .bg-orb-3 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #f472b6, transparent);
            top: 50%;
            left: 60%;
            animation-delay: -6s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        /* Particle grid */
        .grid-bg {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 1.5rem;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow:
                0 32px 64px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255,255,255,0.1);
            animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(40px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-area {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.2rem;
            box-shadow: 0 8px 32px rgba(79, 70, 229, 0.5);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 8px 32px rgba(79, 70, 229, 0.5); }
            50% { box-shadow: 0 8px 48px rgba(168, 85, 247, 0.7); }
        }

        .logo-icon svg {
            width: 36px;
            height: 36px;
            color: white;
        }

        .logo-title {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #c4b5fd);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
            margin-bottom: 0.4rem;
        }

        .logo-subtitle {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 1.4rem;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 0.6rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
            transition: color 0.3s;
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: white;
            padding: 0.9rem 1rem 0.9rem 3rem;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .form-input:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(99, 102, 241, 0.8);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2), 0 4px 16px rgba(0,0,0,0.2);
        }

        .form-input:focus + .input-icon,
        .input-wrapper:focus-within .input-icon {
            color: #818cf8;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
            transition: color 0.3s;
        }

        /* Fix icon inside wrapper */
        .input-wrapper .input-icon {
            z-index: 1;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            padding: 0.2rem;
            border-radius: 4px;
            transition: color 0.3s;
            display: flex;
            align-items: center;
        }

        .password-toggle:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .error-msg {
            display: none;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #fca5a5;
            border-radius: 10px;
            padding: 0.8rem 1rem;
            font-size: 0.88rem;
            margin-bottom: 1.4rem;
            align-items: center;
            gap: 0.5rem;
            animation: shake 0.4s ease;
        }

        .error-msg.show {
            display: flex;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .btn-login {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(79, 70, 229, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-family: inherit;
            letter-spacing: 0.02em;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(79, 70, 229, 0.7);
        }

        .btn-login:hover::before {
            opacity: 1;
        }

        .btn-login:active {
            transform: translateY(1px);
        }

        .btn-login.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .btn-login.loading .spinner {
            display: block;
        }

        .btn-login.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-text {
            text-align: center;
            margin-top: 2rem;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
        }

        /* Caps lock warning */
        .caps-warning {
            display: none;
            font-size: 0.78rem;
            color: #fbbf24;
            margin-top: 0.4rem;
            align-items: center;
            gap: 0.3rem;
        }

        .caps-warning.show {
            display: flex;
        }
    </style>
</head>

<body>
    <div class="grid-bg"></div>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-area">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <line x1="8" y1="21" x2="16" y2="21"></line>
                        <line x1="12" y1="17" x2="12" y2="21"></line>
                    </svg>
                </div>
                <div class="logo-title">監控管理系統</div>
                <div class="logo-subtitle">請登入以繼續使用</div>
            </div>

            <div class="error-msg" id="error-msg">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                <span id="error-text">帳號或密碼錯誤，請重新輸入</span>
            </div>

            <form id="login-form" autocomplete="off">
                <div class="form-group">
                    <label class="form-label" for="username">帳號</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input type="text" id="username" class="form-input" placeholder="請輸入帳號" autocomplete="username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">密碼</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="password" class="form-input" placeholder="請輸入密碼" autocomplete="current-password" required style="padding-right: 3rem;">
                        <button type="button" class="password-toggle" id="pw-toggle" title="顯示/隱藏密碼">
                            <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <div class="caps-warning" id="caps-warning">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
                        Caps Lock 已開啟
                    </div>
                </div>

                <button type="submit" class="btn-login" id="btn-login">
                    <div class="spinner"></div>
                    <span class="btn-text">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:6px;">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                            <polyline points="10 17 15 12 10 7"></polyline>
                            <line x1="15" y1="12" x2="3" y2="12"></line>
                        </svg>
                        登入
                    </span>
                </button>
            </form>

            <div class="footer-text">© 2025 監控管理系統 · 僅授權人員可使用</div>
        </div>
    </div>

    <script>
        // ── 使用者資料管理（以 localStorage 儲存）──
        const USERS_KEY = 'monitoring_system_users';
        const SESSION_KEY = 'monitoring_system_session';

        function initUsers() {
            const existing = localStorage.getItem(USERS_KEY);
            if (!existing) {
                const defaultUsers = [
                    {
                        username: 'qwarepm',
                        password: 'qwarepm',
                        name: '系統管理員',
                        role: 'admin',
                        enabled: true,
                        createdAt: new Date().toISOString()
                    }
                ];
                localStorage.setItem(USERS_KEY, JSON.stringify(defaultUsers));
            } else {
                // 確保 admin 帳號始終存在
                try {
                    const users = JSON.parse(existing);
                    const adminExists = users.some(u => u.username === 'qwarepm');
                    if (!adminExists) {
                        users.unshift({
                            username: 'qwarepm',
                            password: 'qwarepm',
                            name: '系統管理員',
                            role: 'admin',
                            enabled: true,
                            createdAt: new Date().toISOString()
                        });
                        localStorage.setItem(USERS_KEY, JSON.stringify(users));
                    }
                } catch(e) {}
            }
        }

        function authenticate(username, password) {
            try {
                const users = JSON.parse(localStorage.getItem(USERS_KEY) || '[]');
                return users.find(u =>
                    u.username === username &&
                    u.password === password &&
                    u.enabled !== false
                ) || null;
            } catch(e) { return null; }
        }

        // 若已登入，直接跳轉
        window.addEventListener('DOMContentLoaded', function() {
            initUsers();
            const session = sessionStorage.getItem(SESSION_KEY);
            if (session) {
                try {
                    const s = JSON.parse(session);
                    if (s && s.username) {
                        const perms = s.permissions || [];
                        if (s.role === 'admin' || perms.includes('監控申請表單')) {
                            window.location.href = '監控表.html';
                        } else if (perms.includes('查詢及更新監控表單')) {
                            window.location.href = '更新監控表單.html';
                        } else if (perms.includes('監控人員輪值表')) {
                            window.location.href = '監控人員輪值表.html';
                        } else if (perms.includes('售票行事曆')) {
                            window.location.href = '售票行事曆.html';
                        }
                        return;
                    }
                } catch(e) {}
            }
        });

        // 密碼顯示/隱藏
        const pwToggle = document.getElementById('pw-toggle');
        const pwInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eye-icon');
        let pwVisible = false;

        pwToggle.addEventListener('click', function() {
            pwVisible = !pwVisible;
            pwInput.type = pwVisible ? 'text' : 'password';
            eyeIcon.innerHTML = pwVisible
                ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>'
                : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
        });

        // Caps Lock 偵測
        pwInput.addEventListener('keyup', function(e) {
            const capsWarning = document.getElementById('caps-warning');
            if (e.getModifierState && e.getModifierState('CapsLock')) {
                capsWarning.classList.add('show');
            } else {
                capsWarning.classList.remove('show');
            }
        });

        // 登入表單提交
        const loginForm = document.getElementById('login-form');
        const btnLogin = document.getElementById('btn-login');
        const errorMsg = document.getElementById('error-msg');
        const errorText = document.getElementById('error-text');

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            // 顯示載入
            btnLogin.classList.add('loading');
            errorMsg.classList.remove('show');

            // 模擬短暫延遲以提升使用者體驗
            setTimeout(function() {
                const user = authenticate(username, password);
                if (user) {
                    // 儲存 session 資料
                    sessionStorage.setItem(SESSION_KEY, JSON.stringify({
                        username: user.username,
                        name: user.name,
                        role: user.role,
                        permissions: user.permissions || [],
                        loginAt: new Date().toISOString()
                    }));

                    // 跳轉到主頁面：根據權限判斷跳轉
                    const perms = user.permissions || [];
                    if (user.role === 'admin' || perms.includes('監控申請表單')) {
                        window.location.href = '監控表.html';
                    } else if (perms.includes('查詢及更新監控表單')) {
                        window.location.href = '更新監控表單.html';
                    } else if (perms.includes('監控人員輪值表')) {
                        window.location.href = '監控人員輪值表.html';
                    } else if (perms.includes('售票行事曆')) {
                        window.location.href = '售票行事曆.html';
                    } else {
                        alert('您沒有任何頁面的存取權限！');
                        sessionStorage.removeItem(SESSION_KEY);
                        btnLogin.classList.remove('loading');
                    }
                } else {
                    btnLogin.classList.remove('loading');
                    errorText.textContent = '帳號或密碼錯誤，請重新輸入';
                    errorMsg.classList.add('show');
                    // 清空密碼欄位
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            }, 600);
        });

        // Enter 鍵提交
        document.getElementById('username').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('password').focus();
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帳號權限管理 — 監控管理系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: rgba(0, 0, 0, 0.1);
            --input-bg: #ffffff;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            color-scheme: light;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Inter', "微軟正黑體", sans-serif;
            background: linear-gradient(135deg, #e2e8f0 0%, #f8fafc 100%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 200px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--border-color);
            padding: 1.5rem 0.8rem;
            box-shadow: 2px 0 15px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .sidebar-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            flex: 1;
        }

        .sidebar-menu a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-menu a:hover {
            background: rgba(79, 70, 229, 0.1);
            color: var(--primary);
        }

        .sidebar-menu a.active {
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: white;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }

        .sidebar-divider {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 0.6rem 0;
        }

        .sidebar-logout {
            margin-top: auto;
            padding-top: 0.8rem;
        }

        .sidebar-logout a {
            text-decoration: none;
            color: #ef4444;
            font-size: 0.88rem;
            font-weight: 600;
            padding: 0.7rem 1rem;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .sidebar-logout a:hover {
            background: rgba(239, 68, 68, 0.08);
        }

        /* ── Main Content ── */
        .main-content {
            flex: 1;
            padding: 2rem 1.5rem;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8, #c084fc, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .user-info-bar {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.6rem 1.2rem;
            font-size: 0.88rem;
            color: var(--text-muted);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .user-info-bar strong {
            color: var(--text-main);
        }

        .role-badge {
            padding: 0.2rem 0.6rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: white;
        }

        /* ── Card ── */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
            margin-bottom: 1.5rem;
            animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .card-title svg {
            color: var(--primary);
        }

        /* ── Form Layout ── */
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.2rem;
            margin-bottom: 1.4rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.45rem;
            letter-spacing: 0.02em;
        }

        input[type="text"],
        input[type="password"],
        select {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.72rem 1rem;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        /* ── Permissions (checkboxes) ── */
        .permissions-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 0.5rem;
        }

        .perm-chip {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #f1f5f9;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.5rem 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--text-muted);
            user-select: none;
        }

        .perm-chip input[type="checkbox"] {
            accent-color: var(--primary);
            width: 15px;
            height: 15px;
            cursor: pointer;
        }

        .perm-chip:has(input:checked) {
            background: rgba(79, 70, 229, 0.08);
            border-color: rgba(79, 70, 229, 0.4);
            color: var(--primary);
        }

        /* ── Buttons ── */
        .btn {
            padding: 0.72rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: white;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.5);
        }

        .btn-secondary {
            background: rgba(0,0,0,0.05);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(0,0,0,0.1);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            background: #ef4444;
            color: white;
            border-color: #ef4444;
        }

        .btn-sm {
            padding: 0.35rem 0.8rem;
            font-size: 0.78rem;
            border-radius: 7px;
        }

        .btn-success-sm {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 0.35rem 0.8rem;
            font-size: 0.78rem;
            border-radius: 7px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn-success-sm:hover {
            background: #10b981;
            color: white;
            border-color: #10b981;
        }

        .btn-group {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        /* ── Table ── */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }

        thead {
            background: #f1f5f9;
        }

        th {
            padding: 0.8rem 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.82rem;
            white-space: nowrap;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tbody tr {
            transition: background 0.15s;
        }

        tbody tr:hover {
            background: #f8fafc;
        }

        /* ── Badges ── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 0.25rem 0.65rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .badge-admin {
            background: linear-gradient(135deg, #4f46e5, #a855f7);
            color: white;
        }

        .badge-editor {
            background: rgba(16, 185, 129, 0.12);
            color: #059669;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge-viewer {
            background: rgba(100, 116, 139, 0.12);
            color: #475569;
            border: 1px solid rgba(100, 116, 139, 0.3);
        }

        .badge-active {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge-inactive {
            background: rgba(239, 68, 68, 0.08);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.25);
        }

        /* ── toast notification ── */
        .toast {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 9999;
            background: #1e293b;
            color: white;
            padding: 0.9rem 1.4rem;
            border-radius: 12px;
            font-size: 0.92rem;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 340px;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success { border-left: 4px solid #10b981; }
        .toast.error { border-left: 4px solid #ef4444; }
        .toast.warning { border-left: 4px solid #f59e0b; }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 32px 64px rgba(0,0,0,0.25);
            animation: modalIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.94) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 0.8rem;
            margin-top: 1.8rem;
        }

        /* ── Permission section in form ── */
        .section-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            letter-spacing: 0.02em;
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .perm-tag {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            background: rgba(79, 70, 229, 0.07);
            color: var(--primary);
            border: 1px solid rgba(79, 70, 229, 0.2);
            border-radius: 5px;
            padding: 0.15rem 0.45rem;
            font-size: 0.72rem;
            font-weight: 600;
            margin: 1px;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-title">系統選單</div>
        <ul class="sidebar-menu">
            <li>
                <a href="監控表.html">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    監控申請表單
                </a>
            </li>
            <li>
                <a href="更新監控表單.html">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    查詢及更新監控表單
                </a>
            </li>
            <li>
                <a href="監控人員輪值表.html">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    監控人員輪值表
                </a>
            </li>
            <li>
                <a href="售票行事曆.html">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    售票行事曆
                </a>
            </li>
            <hr class="sidebar-divider">
            <li>
                <a href="帳號管理.html" class="active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><line x1="17" y1="11" x2="23" y2="11"></line><line x1="20" y1="8" x2="20" y2="14"></line></svg>
                    帳號權限管理
                </a>
            </li>
        </ul>
        <div class="sidebar-logout">
            <a href="#" id="btn-logout">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                登出
            </a>
        </div>
    </div>

    <!-- Main -->
    <div class="main-content">
        <div class="page-header">
            <h1>帳號權限管理</h1>
            <div class="user-info-bar">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                登入者：<strong id="current-user-name">—</strong>
                <span class="role-badge" id="current-user-role">—</span>
            </div>
        </div>

        <!-- 新增使用者 -->
        <div class="card" id="add-user-card">
            <div class="card-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
                新增使用者
            </div>

            <form id="add-user-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="new-username">帳號 <span style="color:#f472b6">*</span></label>
                        <input type="text" id="new-username" placeholder="英數字，不含空格" required>
                    </div>
                    <div class="form-group">
                        <label for="new-password">密碼 <span style="color:#f472b6">*</span></label>
                        <input type="text" id="new-password" placeholder="請設定密碼" required>
                    </div>
                    <div class="form-group">
                        <label for="new-name">姓名 <span style="color:#f472b6">*</span></label>
                        <input type="text" id="new-name" placeholder="請輸入使用者姓名" required>
                    </div>
                    <div class="form-group">
                        <label for="new-role">角色 <span style="color:#f472b6">*</span></label>
                        <select id="new-role" required>
                            <option value="">— 請選擇角色 —</option>
                            <option value="admin">管理員 (admin)</option>
                            <option value="editor">編輯者 (editor)</option>
                            <option value="viewer">檢視者 (viewer)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 1.4rem;">
                    <span class="section-label">頁面權限（可多選）</span>
                    <div class="permissions-grid" id="permissions-grid">
                        <label class="perm-chip"><input type="checkbox" name="perm" value="監控申請表單"> 監控申請表單</label>
                        <label class="perm-chip"><input type="checkbox" name="perm" value="查詢及更新監控表單"> 查詢及更新監控表單</label>
                        <label class="perm-chip"><input type="checkbox" name="perm" value="監控人員輪值表"> 監控人員輪值表</label>
                        <label class="perm-chip"><input type="checkbox" name="perm" value="售票行事曆"> 售票行事曆</label>
                        <label class="perm-chip"><input type="checkbox" name="perm" value="帳號權限管理"> 帳號權限管理</label>
                    </div>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        新增使用者
                    </button>
                    <button type="button" class="btn btn-secondary" id="btn-reset-form">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 .49-3.5"></path></svg>
                        清空
                    </button>
                </div>
            </form>
        </div>

        <!-- 使用者清單 -->
        <div class="card">
            <div class="card-title" style="justify-content: space-between;">
                <span style="display:flex;align-items:center;gap:0.6rem;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    使用者清單
                </span>
                <span id="user-count" style="font-size:0.85rem; color:var(--text-muted); font-weight:500;"></span>
            </div>
            <div class="table-wrapper">
                <table id="users-table">
                    <thead>
                        <tr>
                            <th>帳號</th>
                            <th>姓名</th>
                            <th>角色</th>
                            <th>開放權限</th>
                            <th>狀態</th>
                            <th>建立時間</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody">
                        <tr>
                            <td colspan="7" class="empty-state">載入中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="edit-modal">
        <div class="modal">
            <div class="modal-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                編輯使用者
            </div>
            <input type="hidden" id="edit-username-key">
            <div class="form-row" style="grid-template-columns: 1fr 1fr;">
                <div class="form-group">
                    <label for="edit-password">密碼</label>
                    <input type="text" id="edit-password" placeholder="留空則不修改">
                </div>
                <div class="form-group">
                    <label for="edit-name">姓名</label>
                    <input type="text" id="edit-name">
                </div>
            </div>
            <div class="form-group" style="margin-bottom:1.2rem;">
                <label for="edit-role">角色</label>
                <select id="edit-role">
                    <option value="admin">管理員 (admin)</option>
                    <option value="editor">編輯者 (editor)</option>
                    <option value="viewer">檢視者 (viewer)</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom:1rem;">
                <span class="section-label">頁面權限</span>
                <div class="permissions-grid" id="edit-permissions-grid">
                    <label class="perm-chip"><input type="checkbox" name="edit-perm" value="監控申請表單"> 監控申請表單</label>
                    <label class="perm-chip"><input type="checkbox" name="edit-perm" value="查詢及更新監控表單"> 查詢及更新監控表單</label>
                    <label class="perm-chip"><input type="checkbox" name="edit-perm" value="監控人員輪值表"> 監控人員輪值表</label>
                    <label class="perm-chip"><input type="checkbox" name="edit-perm" value="售票行事曆"> 售票行事曆</label>
                    <label class="perm-chip"><input type="checkbox" name="edit-perm" value="帳號權限管理"> 帳號權限管理</label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="btn-modal-cancel">取消</button>
                <button type="button" class="btn btn-primary" id="btn-modal-save">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    儲存變更
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <svg width="18" height="18" id="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"></svg>
        <span id="toast-msg"></span>
    </div>

    <script>
        const USERS_KEY = 'monitoring_system_users';
        const SESSION_KEY = 'monitoring_system_session';
        const SCRIPT_URL = 'https://script.google.com/macros/library/d/1Rq6-6-IEEkZsMCylliL0H-R2k1PQu1uRJBlV5va-5Ct1A2noX6gwW4V8/7';

        // ── Auth check ──
        const session = sessionStorage.getItem(SESSION_KEY);
        let currentSession = null;
        try { currentSession = JSON.parse(session); } catch(e) {}

        if (!currentSession || !currentSession.username) {
            window.location.href = 'login.html';
        } else {
            // 只有 admin 可進入此頁
            if (currentSession.role !== 'admin') {
                alert('您沒有權限存取帳號管理頁面！');
                history.back();
            }
        }

        // Show current user info
        if (currentSession) {
            const el = document.getElementById('current-user-name');
            const rl = document.getElementById('current-user-role');
            if (el) el.textContent = currentSession.name || currentSession.username;
            if (rl) {
                rl.textContent = roleLabel(currentSession.role);
            }
        }

        function roleLabel(role) {
            if (role === 'admin') return '管理員';
            if (role === 'editor') return '編輯者';
            if (role === 'viewer') return '檢視者';
            return role;
        }

        // ── User CRUD ──
        function getUsers() {
            try { return JSON.parse(localStorage.getItem(USERS_KEY) || '[]'); } catch(e) { return []; }
        }

        function saveUsers(users) {
            localStorage.setItem(USERS_KEY, JSON.stringify(users));
            
            // 同步帳號資料到 GAS 的「系統帳號」Sheet
            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'sync_users', data: users }),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            }).catch(e => console.error('GAS sync error', e));
        }

        function getPermissions(containerSelector) {
            const perms = [];
            document.querySelectorAll(`${containerSelector} input[type="checkbox"]:checked`).forEach(cb => {
                perms.push(cb.value);
            });
            return perms;
        }

        // ── GAS Log ──
        async function logToGAS(action, targetUser, targetName, targetRole, permissions) {
            try {
                const operator = currentSession ? (currentSession.name || currentSession.username) : 'System';
                const payload = {
                    action: 'log_account',
                    data: [{
                        time: new Date().toLocaleString('zh-TW', { hour12: false }),
                        action: action,
                        operator: operator,
                        targetUser: targetUser,
                        targetName: targetName,
                        targetRole: targetRole,
                        permissions: permissions || []
                    }]
                };
                
                fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                }).catch(e => console.error('GAS log error', e));
                
            } catch (err) {
                console.error('Failed to log to GAS', err);
            }
        }

        // ── Toast ──
        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            const toastIcon = document.getElementById('toast-icon');
            toast.className = `toast ${type}`;
            toastMsg.textContent = msg;
            if (type === 'success') {
                toastIcon.innerHTML = '<polyline points="20 6 9 17 4 12"></polyline>';
            } else if (type === 'error') {
                toastIcon.innerHTML = '<circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line>';
            } else {
                toastIcon.innerHTML = '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line>';
            }
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3500);
        }

        // ── Render Users Table ──
        function renderTable() {
            const users = getUsers();
            const tbody = document.getElementById('users-tbody');
            const countEl = document.getElementById('user-count');
            countEl.textContent = `共 ${users.length} 位使用者`;

            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state">尚無使用者資料</td></tr>';
                return;
            }

            tbody.innerHTML = users.map((u, idx) => {
                const perms = (u.permissions || []).map(p => `<span class="perm-tag">${p}</span>`).join('');
                const roleBadge = u.role === 'admin'
                    ? `<span class="badge badge-admin">管理員</span>`
                    : u.role === 'editor'
                    ? `<span class="badge badge-editor">編輯者</span>`
                    : `<span class="badge badge-viewer">檢視者</span>`;
                const statusBadge = u.enabled !== false
                    ? `<span class="badge badge-active">● 啟用</span>`
                    : `<span class="badge badge-inactive">● 停用</span>`;
                const isAdmin = u.username === 'qwarepm';
                const createdDate = u.createdAt ? new Date(u.createdAt).toLocaleDateString('zh-TW') : '—';
                return `
                    <tr>
                        <td><strong>${u.username}</strong>${isAdmin ? ' <span style="font-size:0.7rem;color:#a855f7;">★</span>' : ''}</td>
                        <td>${u.name || '—'}</td>
                        <td>${roleBadge}</td>
                        <td>${perms || '<span style="color:var(--text-muted);font-size:0.8rem;">無限制</span>'}</td>
                        <td>${statusBadge}</td>
                        <td style="font-size:0.8rem;color:var(--text-muted);">${createdDate}</td>
                        <td>
                            <div style="display:flex;gap:0.4rem;flex-wrap:wrap;">
                                <button class="btn-success-sm" onclick="openEditModal('${u.username}')">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                                    編輯
                                </button>
                                ${u.enabled !== false
                                    ? `<button class="btn btn-sm btn-secondary" onclick="toggleUser('${u.username}', false)">停用</button>`
                                    : `<button class="btn btn-sm btn-secondary" onclick="toggleUser('${u.username}', true)">啟用</button>`
                                }
                                ${!isAdmin ? `<button class="btn btn-sm btn-danger" onclick="deleteUser('${u.username}')">刪除</button>` : ''}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // ── Add User ──
        document.getElementById('add-user-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('new-username').value.trim();
            const password = document.getElementById('new-password').value.trim();
            const name = document.getElementById('new-name').value.trim();
            const role = document.getElementById('new-role').value;

            if (!username || !password || !name || !role) {
                showToast('請填寫所有必填欄位', 'error');
                return;
            }

            if (!/^[a-zA-Z0-9_\-\.]+$/.test(username)) {
                showToast('帳號只能包含英文、數字、底線、連字號', 'error');
                return;
            }

            const users = getUsers();
            if (users.find(u => u.username === username)) {
                showToast(`帳號「${username}」已存在，請使用其他帳號`, 'error');
                return;
            }

            const permissions = getPermissions('#permissions-grid');

            users.push({
                username,
                password,
                name,
                role,
                permissions,
                enabled: true,
                createdAt: new Date().toISOString()
            });

            saveUsers(users);
            renderTable();
            e.target.reset();
            document.querySelectorAll('#permissions-grid input[type="checkbox"]').forEach(cb => cb.checked = false);
            showToast(`使用者「${name}」新增成功！`, 'success');

            logToGAS('新增', username, name, role, permissions);
        });

        document.getElementById('btn-reset-form').addEventListener('click', function() {
            document.getElementById('add-user-form').reset();
            document.querySelectorAll('#permissions-grid input[type="checkbox"]').forEach(cb => cb.checked = false);
        });

        // ── Toggle User Status ──
        function toggleUser(username, enabled) {
            const users = getUsers();
            const idx = users.findIndex(u => u.username === username);
            if (idx < 0) return;
            users[idx].enabled = enabled;
            saveUsers(users);
            renderTable();
            showToast(`帳號「${username}」已${enabled ? '啟用' : '停用'}`, 'success');
            
            logToGAS(enabled ? '啟用' : '停用', username, users[idx].name, users[idx].role, users[idx].permissions);
        }

        // ── Delete User ──
        function deleteUser(username) {
            if (!confirm(`確定要刪除帳號「${username}」？此操作無法復原。`)) return;
            const users = getUsers();
            const user = users.find(u => u.username === username);
            const newUsers = users.filter(u => u.username !== username);
            saveUsers(newUsers);
            renderTable();
            showToast(`帳號「${username}」已刪除`, 'warning');
            
            if (user) {
                logToGAS('刪除', username, user.name, user.role, user.permissions);
            }
        }

        // ── Edit Modal ──
        function openEditModal(username) {
            const users = getUsers();
            const user = users.find(u => u.username === username);
            if (!user) return;

            document.getElementById('edit-username-key').value = username;
            document.getElementById('edit-password').value = '';
            document.getElementById('edit-name').value = user.name || '';
            document.getElementById('edit-role').value = user.role || 'viewer';

            // Set permissions checkboxes
            const editPerms = user.permissions || [];
            document.querySelectorAll('#edit-permissions-grid input[type="checkbox"]').forEach(cb => {
                cb.checked = editPerms.includes(cb.value);
            });

            document.getElementById('edit-modal').classList.add('show');
        }

        document.getElementById('btn-modal-cancel').addEventListener('click', () => {
            document.getElementById('edit-modal').classList.remove('show');
        });

        document.getElementById('edit-modal').addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('show');
        });

        document.getElementById('btn-modal-save').addEventListener('click', function() {
            const username = document.getElementById('edit-username-key').value;
            const newPassword = document.getElementById('edit-password').value.trim();
            const newName = document.getElementById('edit-name').value.trim();
            const newRole = document.getElementById('edit-role').value;
            const newPerms = getPermissions('#edit-permissions-grid');

            if (!newName) {
                showToast('姓名不能為空白', 'error');
                return;
            }

            const users = getUsers();
            const idx = users.findIndex(u => u.username === username);
            if (idx < 0) return;

            if (newPassword) users[idx].password = newPassword;
            users[idx].name = newName;
            users[idx].role = newRole;
            users[idx].permissions = newPerms;

            saveUsers(users);
            renderTable();

            // 若是修改目前登入帳號，更新 session
            if (currentSession && currentSession.username === username) {
                currentSession.name = newName;
                currentSession.role = newRole;
                sessionStorage.setItem(SESSION_KEY, JSON.stringify(currentSession));
            }

            document.getElementById('edit-modal').classList.remove('show');
            showToast(`使用者「${newName}」已更新`, 'success');

            logToGAS('編輯', username, newName, newRole, newPerms);
        });

        // ── Logout ──
        document.getElementById('btn-logout').addEventListener('click', function(e) {
            e.preventDefault();
            if (confirm('確定要登出嗎？')) {
                sessionStorage.removeItem(SESSION_KEY);
                window.location.href = 'login.html';
            }
        });

        // ── Init ──
        renderTable();
    </script>
</body>

</html>

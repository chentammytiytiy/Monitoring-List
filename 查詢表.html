<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>監控已申請資料查詢</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: rgba(0, 0, 0, 0.1);
            --input-bg: #ffffff;
            color-scheme: light;
        }

        body {
            margin: 0;
            font-family: 'Inter', "微軟正黑體", sans-serif;
            background: linear-gradient(135deg, #e2e8f0 0%, #f8fafc 100%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 200px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--border-color);
            padding: 1.5rem 0.8rem;
            box-shadow: 2px 0 15px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .sidebar-menu a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-menu a:hover {
            background: rgba(79, 70, 229, 0.1);
            color: var(--primary);
        }

        .sidebar-menu a.active {
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: white;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }

        .main-content {
            flex: 1;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.5rem;
            width: 100%;
            max-width: 98%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 2rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #c084fc, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .nav-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            background: rgba(79, 70, 229, 0.1);
            transition: all 0.2s;
        }

        .nav-link:hover {
            background: rgba(79, 70, 229, 0.2);
        }

        .search-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            background: rgba(0, 0, 0, 0.02);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            align-items: flex-end;
            max-width: fit-content;
        }

        .date-range-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .date-range-group input {
            width: 105px;
            text-align: center;
            padding: 0.6rem 0.5rem;
        }

        .date-range-group span {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.85rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--text-muted);
        }

        input,
        select {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.6rem 0.8rem;
            border-radius: 8px;
            font-size: 0.85rem;
            transition: all 0.3s;
            outline: none;
            font-family: inherit;
        }

        input:focus,
        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        .search-btn-container {
            display: flex;
            align-items: flex-end;
            gap: 0.8rem;
        }

        button.btn-clear {
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            height: 35px;
            min-width: 80px;
            transition: all 0.2s;
        }

        button.btn-clear:hover {
            background: rgba(0, 0, 0, 0.1);
            border-color: rgba(0, 0, 0, 0.3);
        }

        button.btn-search {
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            height: 35px;
            min-width: 90px;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
        }

        button.btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(79, 70, 229, 0.4);
        }

        /* Table Styling */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
        }

        thead {
            background: #f1f5f9;
        }

        th,
        td {
            padding: 0.3rem 0.4rem;
            text-align: left;
            font-size: 0.75rem;
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            letter-spacing: -0.01em;
        }

        th {
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
        }

        td {
            color: var(--text-main);
            white-space: nowrap;
        }

        td.col-name {
            white-space: pre-wrap;
            word-break: break-all;
            min-width: 15rem;
            max-width: 15rem;
        }

        td.col-saleDate {
            white-space: nowrap;
            min-width: 140px;
        }

        td.col-time {
            white-space: nowrap;
            min-width: 70px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        th:last-child,
        td:last-child {
            border-right: none;
        }

        tbody tr {
            transition: background 0.15s;
        }

        tbody tr:hover {
            background: #f8fafc;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        #result-count {
            margin-bottom: 1rem;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .apply-time {
            font-size: 0.7rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* Pagination Styling */
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }

        .page-btn {
            background: #fff;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .page-btn:hover {
            background: #f1f5f9;
        }

        .page-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-edit {
            background: #e2e8f0;
            color: #475569;
            border: none;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .btn-edit:hover {
            background: #cbd5e1;
            color: #1e293b;
        }

        .btn-save {
            background: #34d399;
            color: white;
            border: none;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            display: none;
        }

        .btn-save:hover {
            background: #10b981;
        }

        .cell-input {
            width: 100%;
            box-sizing: border-box;
            padding: 0.2rem;
            font-size: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: #F8FAFC;
        }
    </style>
</head>

    <div class="main-content">
        <div class="container">
        <div class="header-row">
            <h1>監控申請資料查詢</h1>
            <div style="display:flex; gap: 0.5rem;">
                <button type="button" class="nav-link" id="btn-export-excel" style="border:none; cursor:pointer;"
                    disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>

                </button>
            </div>
        </div>

            <div class="form-group">
                <label>開賣日期區間</label>
                <div class="date-range-group">
                    <input type="text" id="search-date-start" placeholder="yyyy/mm/dd" onfocus="this.type='date'" onblur="if(!this.value) this.type='text'">
                    <span>至</span>
                    <input type="text" id="search-date-end" placeholder="yyyy/mm/dd" onfocus="this.type='date'" onblur="if(!this.value) this.type='text'">
                </div>
            </div>

            <div class="form-group">
                <label for="search-code">節目代碼 / 活動名稱</label>
                <input type="text" id="search-code" placeholder="輸入關鍵字...">
            </div>

            <div class="form-group">
                <label for="search-system">系統別</label>
                <select id="search-system">
                    <option value="">全部系統</option>
                    <option value="A系統">A系統</option>

                </select>

                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    清除
                </button>

                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>

        <div id="result-count"></div>

        <div class="table-wrapper">
            <table id="results-table">
                <thead>
                    <tr>
                        <th>申請時間</th>
                        <th>開賣日期</th>
                        <th>時間</th>
                        <th>售票/核銷</th>
                        <th>監控等級</th>
                        <th>系統別</th>
                        <th>A節目代碼/E活動分類</th>
                        <th>活動名稱</th>
                        <th>機器等級</th>
                        <th>排隊機制</th>
                        <th>售票通路</th>
                        <th>機台流管</th>

                        <th>其它單位監控</th>
                        <th>特別說明</th>
                        <th>負責業務</th>
                        <th>建檔人員</th>
                        <th>監控PM</th>
                        <th>A系統+會員IT</th>
                        <th>金流IT</th>
                        <th>D系統IT</th>
                        <th>Q系統IT</th>
                        <th>E系統IT</th>
                    </tr>
                </thead>
                <tbody id="results-tbody">
                    <!-- Data will be populated here -->
                    <tr>
                        <td colspan="23" class="empty-state">請點擊上方查詢按鈕或輸入條件後查詢</td>
                    </tr>
                </tbody>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxlVEL8SwA5hy28n2-6TgQGG1cd0rhG81azxr4nlUwy-c6lqtODZHrwI5yeOOAfb5vC7A/exec';
        let allHistoricalRecords = [];
        let currentFilteredRecords = []; // Keep track of the currently displayed records for Excel export
        let currentPage = 1;
        const itemsPerPage = 50;

        // Initialize logic
        window.onload = async function () {
            document.getElementById('results-tbody').innerHTML = '<tr><td colspan="23" class="empty-state">資料載入中，請稍候...</td></tr>';
            try {
                const response = await fetch(`${SCRIPT_URL}?t=${new Date().getTime()}`);
                allHistoricalRecords = await response.json();
            } catch (e) {
                console.error("無法讀取資料庫資料:", e);
                document.getElementById('results-tbody').innerHTML = '<tr><td colspan="23" class="empty-state" style="color:red;">讀取資料庫失敗，請重整畫面</td></tr>';
            }

            // By default initially, show all but sorted correctly
            // We need to trigger the search flow so pagination resets properly
            document.getElementById('btn-search').click();
        };

        // Clear button click
        document.getElementById('btn-clear').addEventListener('click', function () {
            document.getElementById('search-date-start').value = '';
            document.getElementById('search-date-end').value = '';
            document.getElementById('search-code').value = '';
            document.getElementById('search-system').value = '';
            
            // Reset dates placeholder behavior
            document.getElementById('search-date-start').type = 'text';
            document.getElementById('search-date-end').type = 'text';

            document.getElementById('btn-search').click();
        });

        // Search button click
        document.getElementById('btn-search').addEventListener('click', function () {
            const sDateStart = document.getElementById('search-date-start').value.trim();
            const sDateEnd = document.getElementById('search-date-end').value.trim();
            const sCodeOrName = document.getElementById('search-code').value.trim().toLowerCase();
            const sSystem = document.getElementById('search-system').value;

            // Convert boundaries to Comparable Date objects if they exist
            let dStart = null, dEnd = null;
            if (sDateStart) dStart = new Date(sDateStart);
            if (sDateEnd) {
                // To include the entire end day, we could technically append 23:59:59 but 
                // since the record saleDate doesn't usually have a time component, simple Date comparison is fine.
                dEnd = new Date(sDateEnd);
            }

            const filtered = allHistoricalRecords.filter(record => {
                let match = true;

                // 1. Date Range check
                if (dStart || dEnd) {
                    const recDateStr = record['開賣日期'];
                    if (!recDateStr) {
                        match = false;
                    } else {
                        // Attempt to parse exactly "yyyy/mm/dd" correctly
                        // The recorded format is usually yyyy/mm/dd mapping cleanly
                        const recDate = new Date(recDateStr);
                        if (!isNaN(recDate.getTime())) {
                            if (dStart && recDate < dStart) match = false;
                            if (dEnd && recDate > dEnd) match = false;
                        } else {
                            // Fallback string manipulation if parsing failed
                            match = false; // hard to compare range on totally malformed date strings
                        }
                    }
                }

                // 2. Code or Name check (A節目代碼/E活動分類 OR 活動名稱)
                if (sCodeOrName && match) {
                    const code = (record['A節目代碼/E活動分類'] || '').toLowerCase();
                    const name = (record['活動名稱'] || '').toLowerCase();
                    if (!code.includes(sCodeOrName) && !name.includes(sCodeOrName)) {
                        match = false;
                    }
                }

                // 3. System check
                if (sSystem && match) {
                    if (record['系統別'] !== sSystem) {
                        match = false;
                    }
                }

                return match;
            });

            // Re-sort data descending by "開賣日期"
            const sortedBySaleDate = [...filtered].sort((a, b) => {
                // Parse correctly, fallback to epoch if missing
                const dateA = new Date(a['開賣日期'] || parseInt(a['申請時間']));
                const dateB = new Date(b['開賣日期'] || parseInt(b['申請時間']));
                return dateB - dateA;
            });

            currentFilteredRecords = sortedBySaleDate;
            currentPage = 1; // Reset to page 1 on new search
            renderTablePaginated();

            // Enable/Disable Excel button based on results
            const excelBtn = document.getElementById('btn-export-excel');
            if (sortedBySaleDate.length > 0) {
                excelBtn.removeAttribute('disabled');
                excelBtn.style.opacity = '1';
                excelBtn.style.cursor = 'pointer';
            } else {
                excelBtn.setAttribute('disabled', 'true');
                excelBtn.style.opacity = '0.5';
                excelBtn.style.cursor = 'not-allowed';
            }
        });

        function changePage(page) {
            currentPage = page;
            renderTablePaginated();
        }

        function renderPaginationControls(totalItems) {
            const paginationDiv = document.getElementById('pagination');
            if (totalItems <= itemsPerPage) {
                paginationDiv.innerHTML = '';
                return;
            }

            const totalPages = Math.ceil(totalItems / itemsPerPage);
            let html = `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">上一頁</button>`;

            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            }

            html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">下一頁</button>`;

            paginationDiv.innerHTML = html;
        }

        function renderTablePaginated() {
            const tbody = document.getElementById('results-tbody');
            const countDiv = document.getElementById('result-count');

            const dataArray = currentFilteredRecords;

            if (!dataArray || dataArray.length === 0) {
                countDiv.innerHTML = `共找到 <strong style="color:var(--text-main);">0</strong> 筆資料`;

                const origIdx = allHistoricalRecords.indexOf(r);

        function editRow(btn, idx) {
            const tr = btn.closest('tr');
            btn.style.display = 'none';
            tr.querySelector('.btn-save').style.display = 'inline-block';

            const record = allHistoricalRecords[idx];

            const colsToMap = {
                'saleDate': '開賣日期',
                'time': '時間',
                'action': '售票/核銷',
                'level': '監控等級',
                'sys': '系統別',
                'code': 'A節目代碼/E活動分類',
                'name': '活動名稱',
                'machine': '機器等級',
                'queue': '排隊機制',
                'channel': '售票通路',
                'machineFlow': '機台流管',
                'tickets': '可售張數',
                'otherMonitor': '其它單位監控',
                'note': '特別說明',
                'owner': '負責業務',
                'op': '建檔OP'
            };

            const selectOptions = {};

            Object.keys(colsToMap).forEach(col => {
                const td = tr.querySelector('.col-' + col);
                const val = record[colsToMap[col]] || '';
                
                if (selectOptions[col]) {
                    let optionsHtml = selectOptions[col].map(opt => `<option value="${opt}" ${val === opt ? 'selected' : ''}>${opt}</option>`).join('');
                    if (!selectOptions[col].includes(val) && val) {
                        optionsHtml = `<option value="${val}" selected>${val}</option>` + optionsHtml;
                    }
                    td.innerHTML = `<select class="cell-input input-${col}">${optionsHtml}</select>`;
                } else {
                    td.innerHTML = `<input type="text" class="cell-input input-${col}" value="${val}">`;
                }
            });
        }

        function saveRow(btn, idx) {
            const tr = btn.closest('tr');

            // Read values back
            const newSaleDate = tr.querySelector('.input-saleDate').value.trim();
            const newTime = tr.querySelector('.input-time').value.trim();
            const newAction = tr.querySelector('.input-action').value.trim();
            const newLevel = tr.querySelector('.input-level').value.trim();
            const newSys = tr.querySelector('.input-sys').value.trim();
            const newCode = tr.querySelector('.input-code').value.trim();
            const newName = tr.querySelector('.input-name').value.trim();
            const newMachine = tr.querySelector('.input-machine').value.trim();
            const newQueue = tr.querySelector('.input-queue').value.trim();
            const newChannel = tr.querySelector('.input-channel').value.trim();
            const newMachineFlow = tr.querySelector('.input-machineFlow').value.trim();
            const newTickets = tr.querySelector('.input-tickets').value.trim();
            const newOtherMonitor = tr.querySelector('.input-otherMonitor').value.trim();
            const newNote = tr.querySelector('.input-note').value.trim();
            const newOwner = tr.querySelector('.input-owner').value.trim();
            const newOp = tr.querySelector('.input-op').value.trim();

            const record = allHistoricalRecords[idx];
            const mods = record._modified || [];

            const updates = [
                { k: '開賣日期', v: newSaleDate },
                { k: '時間', v: newTime },
                { k: '售票/核銷', v: newAction },
                { k: '監控等級', v: newLevel },
                { k: '系統別', v: newSys },
                { k: 'A節目代碼/E活動分類', v: newCode },
                { k: '活動名稱', v: newName },
                { k: '機器等級', v: newMachine },
                { k: '排隊機制', v: newQueue },
                { k: '售票通路', v: newChannel },
                { k: '機台流管', v: newMachineFlow },
                { k: '可售張數', v: newTickets },
                { k: '其它單位監控', v: newOtherMonitor },
                { k: '特別說明', v: newNote },
                { k: '負責業務', v: newOwner },
                { k: '建檔OP', v: newOp }
            ];

            updates.forEach(u => {
                if (record[u.k] !== u.v) {
                    if (!mods.includes(u.k)) mods.push(u.k);
                    record[u.k] = u.v;
                }
            });

            record._modified = mods;
            record['申請時間'] = new Date().toLocaleString('zh-TW') + ' (已更新)';

            // Save to local storage
            localStorage.setItem('appliedMonitorRecords', JSON.stringify(allHistoricalRecords));

            // Resend Email with the updated single record (to notify the update)
            sendUpdateEmailNotification([record]);

            alert('已成功更新資料，並產生更新的 Outlook Email 通知。\\n請查看下載檔案或彈出的 Outlook 視窗。');
